<div class="progress-section">

    <!-- QUIZ -->
    <div class="progress-tile glass-panel">
        <div class="progress-icon-row">
            <span class="progress-icon gradient-a1">📘</span>
            <label class="section-title">Quiz Progress</label>
            <span class="progress-number" id="quiz-number">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="quiz-progress"></div>
        </div>
    </div>

    <!-- BUILD -->
    <div class="progress-tile glass-panel">
        <div class="progress-icon-row">
            <span class="progress-icon gradient-a2">🧩</span>
            <label class="section-title">Build Progress</label>
            <span class="progress-number" id="build-number">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="build-progress"></div>
        </div>
    </div>

    <!-- SENTENCE -->
    <div class="progress-tile glass-panel">
        <div class="progress-icon-row">
            <span class="progress-icon gradient-b1">✏️</span>
            <label class="section-title">Sentence Progress</label>
            <span class="progress-number" id="sentence-number">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="sentence-progress"></div>
        </div>
    </div>

    <!-- XP -->
    <div class="progress-tile glass-panel">
        <div class="progress-icon-row">
            <svg class="progress-svg xp-icon" viewBox="0 0 24 24">
                <path d="M12 2C9 5 8 7.5 8 9.5C8 12 9.5 13.5 12 15C14.5 13.5 16 12 16 9.5C16 7.5 15 5 12 2Z" />
            </svg>
            <label class="section-title">XP Progress</label>
            <span class="progress-number" id="xp-number">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="xp-progress"></div>
        </div>
    </div>

    <!-- STREAK -->
    <div class="progress-tile glass-panel">
        <div class="progress-icon-row">
            <span class="progress-icon gradient-a2">⚡</span>
            <label class="section-title">Streak</label>
            <span class="progress-number" id="streak-number">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="streak-progress"></div>
        </div>
    </div>

    <!-- SCORE -->
    <div class="progress-tile glass-panel">
        <div class="progress-icon-row">
            <span class="progress-icon gradient-b1">⭐</span>
            <label class="section-title">Score Rating</label>
            <span class="progress-number" id="score-number">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="score-progress"></div>
        </div>
    </div>

    <!-- REVIEW -->
    <div class="progress-tile glass-panel">
        <div class="progress-icon-row">
            <span class="progress-icon gradient-b2">⏳</span>
            <label class="section-title">Due for Review</label>
            <span class="progress-number" id="review-number">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="review-progress"></div>
        </div>
    </div>

</div>


    <div class="badge-section glass-panel">
        <h3>Your Badges</h3>
        <ul id="badge-list"></ul>
    </div>

</div>

<!-- OTHER TABS -->
<div id="listen" class="hidden"></div>
<div id="flash" class="hidden"></div>
<div id="quiz" class="hidden"></div>
<div id="build" class="hidden"></div>

<!-- SENTENCE BEFORE CONVERSATION -->
<div id="sentence" class="hidden"></div>
<div id="conversation" class="hidden"></div>

<div id="grammar" class="hidden"></div>

<script src="wordbanks/B2.js"></script>
