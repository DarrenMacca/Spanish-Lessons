<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Lessons</title>

    <!-- Core Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Prevent GitHub Pages caching -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
</head>

<body>

    <!-- Achievement Popups -->
    <div id="achievement-popups"></div>

    <!-- Tabs -->
    <nav class="tabs">
        <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
        <button class="tab-btn" data-tab="listen">Listen</button>
        <button class="tab-btn" data-tab="flash">Flashcards</button>
        <button class="tab-btn" data-tab="quiz">Quiz</button>
        <button class="tab-btn" data-tab="build">Builder</button>
        <button class="tab-btn" data-tab="conversation">Conversation</button>
        <button class="tab-btn" data-tab="certificates">Certificates</button>
        <button class="tab-btn" data-tab="badges">Badges</button>
    </nav>

    <!-- Dashboard -->
    <section id="dashboard" class="tab-section">
        <h2>Dashboard</h2>
        <p>Level: <span id="current-level"></span></p>
        <p>XP: <span id="xp-total"></span></p>
        <div class="xp-bar"><div class="xp-fill"></div></div>
        <p>Quiz Mastery: <span id="quiz-average"></span></p>
        <p>Builder Score: <span id="builder-score"></span></p>
        <p>Conversation Count: <span id="conversation-count"></span></p>
        <p>Streak: <span id="streak-days"></span></p>

        <h3>User Settings</h3>
        <input id="user-name-input" placeholder="Your name">
        <button id="save-name-btn">Save Name</button>

        <div>
            <label>Speech Rate: <span id="speech-rate-label"></span></label>
            <input type="range" id="speech-rate-slider" min="0.5" max="2.0" step="0.05">
        </div>

        <div class="level-select">
            <button class="level-btn" data-level="A1">A1</button>
            <button class="level-btn" data-level="A2">A2</button>
            <button class="level-btn" data-level="B1">B1</button>
        </div>
    </section>

    <!-- Listen -->
    <section id="listen" class="tab-section hidden">
        <h2>Listen</h2>
        <div id="listen-area">
            <button id="listen-play-all">Play All</button>
            <button id="listen-stop">Stop</button>
            <button id="listen-pause">Pause</button>
            <button id="listen-resume">Resume</button>

            <div class="listen-word" data-audio="audio/hola.mp3">Hola</div>
            <div class="listen-word" data-audio="audio/gracias.mp3">Gracias</div>
        </div>
    </section>

    <!-- Flashcards -->
    <section id="flash" class="tab-section hidden">
        <h2>Flashcards</h2>
        <div id="flashcard"></div>
        <button id="flash-prev">Previous</button>
        <button id="flash-flip">Flip</button>
        <button id="flash-next">Next</button>
    </section>

    <!-- Quiz -->
    <section id="quiz" class="tab-section hidden">
        <h2>Quiz</h2>
        <button id="quiz-start">Start Quiz</button>
        <div id="quiz-area"></div>
    </section>

    <!-- Builder -->
    <section id="build" class="tab-section hidden">
        <h2>Sentence Builder</h2>
        <div id="builder-area"></div>
        <button id="builder-check">Check Sentence</button>
        <p id="builder-result"></p>
    </section>

    <!-- Conversation -->
    <section id="conversation" class="tab-section hidden">
        <h2>Conversation Practice</h2>
        <p id="conversation-area"></p>
        <button id="conversation-next">Next Prompt</button>
    </section>

    <!-- Certificates -->
    <section id="certificates" class="tab-section hidden">
        <h2>Certificates</h2>
        <div id="certificates-area"></div>
    </section>

    <!-- Badges -->
    <section id="badges" class="tab-section hidden">
        <h2>Badges</h2>
        <ul id="badge-list"></ul>
    </section>

    <!-- Load Updated JS -->
    <script src="app-v2-new.js?v=2"></script>

</body>
</html>
