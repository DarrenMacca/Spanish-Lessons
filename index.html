<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; color: #1e293b; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        .hidden { display: none; }
        .card { width: 140px; height: 90px; display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--primary); border-radius: 10px; margin: 8px; cursor: pointer; font-weight: bold; background: white; }
        .word-pill { display: inline-block; padding: 10px 18px; margin: 6px; background: #dbeafe; border-radius: 20px; cursor: pointer; border: 1px solid #bfdbfe; font-size: 14px; }
        .quiz-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .status-box { padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Dashboard -->
    <div id="dashboard-view">
        <h1>Welcome to CEFR Mastery</h1>
        <div class="status-box">Overall Course Proficiency: <b id="course-status">Pending</b></div>
        <button class="tab-btn" onclick="openApp()" style="background: var(--primary); color: white;">Start Learning</button>
    </div>

    <!-- Learning Portal -->
    <div id="learning-view" class="hidden">
        <button onclick="goBack()" style="margin-bottom:20px;">← Back to Dashboard</button>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('listen')">Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">Building</button>
            <button class="tab-btn" onclick="showTab('conv')">Conversation</button>
        </div>
        
        <div class="tab-content" id="listen"><h3>Audio Practice</h3><div id="listen-list"></div></div>
        <div class="tab-content hidden" id="flash"><h3>Flashcards</h3><div id="flash-area"></div></div>
        <div class="tab-content hidden" id="quiz"><h3>Quick Quiz</h3><div id="quiz-area"></div></div>
        <div class="tab-content hidden" id="build"><h3>Sentence Builder</h3><div id="build-area"></div></div>
        
        <div class="tab-content hidden" id="conv">
            <h3>Conversation: Answer the Question</h3>
            <h3 id="conv-task"></h3>
            <p id="c-progress-counter"></p>
            <button onclick="speak(window.currentConv.q_es)">🔊 Hear Question</button>
            <button onclick="speak(window.currentConv.target)">🔊 Hear Answer</button>
            <div id="conv-word-bank" style="margin:20px 0;"></div>
            <div id="conv-sentence-box" style="padding:15px; border:2px dashed #cbd5e1; min-height:40px; margin: 10px 0;"></div>
            <button onclick="checkConv()">Submit Answer</button>
            <button onclick="document.getElementById('conv-sentence-box').innerText=''">Reset</button>
            <button id="show-conv-answer-btn" class="hidden" onclick="revealConvAnswer()">Show Answer</button>
            <button onclick="nextConvTask()" id="next-btn" class="hidden">Next Question</button>
            <button onclick="location.reload()" style="background: #ef4444; color: white;">Restart Course</button>
            <span id="c-feedback" style="margin-left:10px; font-weight:bold;"></span>
        </div>
    </div>
</div>

<script>
    const data = {
        words: [{es: 'Yo', en: 'I'}, {es: 'Feliz', en: 'Happy'}, {es: 'La', en: 'The'}, {es: 'Casa', en: 'House'}, {es: 'Grande', en: 'Big'}, {es: 'Tu', en: 'You'}, {es: 'Beber', en: 'Drink'}, {es: 'Agua', en: 'Water'}, {es: 'El', en: 'He'}, {es: 'Pan', en: 'Bread'}, {es: 'Aquí', en: 'Here'}, {es: 'Amigo', en: 'Friend'}],
        conversations: [
            {q: 'How are you?', q_es: '¿Cómo estás?', target: 'Yo Feliz'}, 
            {q: 'Where is the house?', q_es: '¿Dónde está la casa?', target: 'La Casa Grande'}, 
            {q: 'Do you drink water?', q_es: '¿Tú bebes agua?', target: 'Tu Beber Agua'}, 
            {q: 'Is the bread here?', q_es: '¿Está el pan aquí?', target: 'El Pan Aquí'}, 
            {q: 'Are you a friend?', q_es: '¿Eres tú amigo?', target: 'Yo Amigo'}
        ]
    };

    let cCount = 1, cAttempts = 0, totalScore = 0;

    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.lang = 'es-MX'; speechSynthesis.speak(s); }
    function openApp() { document.getElementById('dashboard-view').classList.add('hidden'); document.getElementById('learning-view').classList.remove('hidden'); }
    function goBack() { document.getElementById('dashboard-view').classList.remove('hidden'); document.getElementById('learning-view').classList.add('hidden'); }

    function renderConv() {
        if (cCount > data.conversations.length) {
            let finalPercent = Math.round((totalScore / 15) * 100);
            document.getElementById('conv').innerHTML = (finalPercent >= 90) ? 
                `<h2>🎉 Course Complete!</h2><p>Proficiency: ${finalPercent}%. You have mastered these conversations.</p>` : 
                `<h2>Needs Improvement</h2><p>Proficiency: ${finalPercent}%. You need 90% to pass.</p>`;
            return;
        }
        window.currentConv = data.conversations[cCount - 1];
        document.getElementById('conv-task').innerText = "Question: " + currentConv.q;
        document.getElementById('c-progress-counter').innerText = `Task ${cCount}/5`;
        document.getElementById('conv-word-bank').innerHTML = data.words.map(w => `<span class="word-pill" onclick="document.getElementById('conv-sentence-box').innerText+=' ' + '${w.es}'">${w.es}</span>`).join('');
    }

    function checkConv() {
        const userAns = document.getElementById('conv-sentence-box').innerText.trim().replace(/\s+/g, ' ');
        if(userAns === currentConv.target) {
            totalScore += (cAttempts === 0 ? 3 : (cAttempts === 1 ? 2 : 1));
            document.getElementById('c-feedback').innerText = "Correct! ✅";
            document.getElementById('next-btn').classList.remove('hidden');
        } else {
            cAttempts++;
            document.getElementById('c-feedback').innerText = "Try again. Attempts: " + cAttempts + "/3";
            if(cAttempts >= 3) document.getElementById('show-conv-answer-btn').classList.remove('hidden');
        }
    }

    function nextConvTask() { cCount++; cAttempts = 0; document.getElementById('conv-sentence-box').innerText = ''; document.getElementById('c-feedback').innerText = ''; renderConv(); }
    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.remove('hidden'); event.target.classList.add('active'); }
    function revealConvAnswer() { document.getElementById('conv-sentence-box').innerText = currentConv.target; }

    renderConv();
</script>
</body>
</html>
