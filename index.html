<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEFR Spanish Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-6">
    <div id="app" class="max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Spanish Proficiency Portal</h1>
        
        <!-- Dashboard Container -->
        <div id="dashboard" class="space-y-4"></div>
        
        <!-- Lesson Container -->
        <div id="lesson-ui" class="hidden bg-white p-6 rounded-lg shadow">
            <button type="button" onclick="goHome()" class="text-blue-600 mb-4 font-bold">← Back to Dashboard</button>
            <h2 id="lesson-title" class="text-xl font-bold"></h2>
            <div id="vocab-display" class="grid grid-cols-2 gap-2 my-4"></div>
            <p id="lesson-goal" class="text-sm italic text-slate-500"></p>
        </div>
    </div>

    <script>
        // Ensure DOM is ready before running
        document.addEventListener('DOMContentLoaded', () => {
            const curriculum = [
                { id: 'A1', title: 'Beginner', words: ['Hola', 'Gracias', 'Yo', 'Ser'], goal: 'Introduce yourself.' },
                { id: 'A2', title: 'Elementary', words: ['Tienda', 'Mapa', 'Donde', 'Calle'], goal: 'Ask for directions.' }
            ];

            window.goHome = () => {
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('lesson-ui').classList.add('hidden');
            };

            window.loadLesson = (id) => {
                const data = curriculum.find(l => l.id === id);
                document.getElementById('lesson-title').innerText = data.title;
                document.getElementById('lesson-goal').innerText = data.goal;
                document.getElementById('vocab-display').innerHTML = data.words
                    .map(w => `<div class="p-2 bg-blue-50 border rounded">${w}</div>`).join('');
                
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('lesson-ui').classList.remove('hidden');
            };

            // Initial Render
            const dash = document.getElementById('dashboard');
            dash.innerHTML = curriculum.map(l => `
                <div class="p-4 bg-white border rounded shadow-sm flex justify-between items-center">
                    <span>${l.id}: ${l.title}</span>
                    <button type="button" onclick="loadLesson('${l.id}')" class="bg-blue-600 text-white px-4 py-2 rounded">Start</button>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
