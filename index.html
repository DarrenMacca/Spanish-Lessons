<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 40px 20px; color: #1e293b; }
        .grid-container { max-width: 1000px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Card Styling */
        .card { width: 120px; height: 160px; background: white; border: 2px solid var(--primary); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; margin: 10px; cursor: pointer; text-align: center; font-weight: bold; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        
        .word-pill { display: inline-block; padding: 8px 16px; margin: 4px; background: #dbeafe; border-radius: 20px; cursor: pointer; border: 1px solid #bfdbfe; }
        .btn-reset { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- LISTEN -->
    <div class="section">
        <h3>1. Listen & Learn</h3>
        <div id="listen-area" style="max-height: 300px; overflow-y: auto;"></div>
    </div>

    <!-- FLASHCARDS -->
    <div class="section">
        <h3>2. Flashcards</h3>
        <div id="flash-area"></div>
    </div>

    <!-- QUIZ -->
    <div class="section">
        <h3>3. Quiz</h3>
        <div id="quiz-area"></div>
    </div>

    <!-- BUILDER -->
    <div class="section">
        <h3>4. Sentence Builder</h3>
        <div id="build-area"></div>
        <div id="sentence-box" style="padding:15px; background:#f8fafc; border:2px dashed #cbd5e1; margin:15px 0; min-height:50px; border-radius:8px;"></div>
        <button onclick="checkBuild()">Submit</button>
        <button class="btn-reset" onclick="resetBuild()">Reset</button>
    </div>
</div>

<script>
    const data = {
        words: [{es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thank you'}, {es: 'Casa', en: 'House'}, {es: 'Yo', en: 'I'}, {es: 'Pan', en: 'Bread'}, {es: 'Comer', en: 'Eat'}, {es: 'Feliz', en: 'Happy'}],
        sentences: [{en: 'I eat bread', target: 'Yo Comer Pan'}, {en: 'I am happy', target: 'Yo Feliz'}]
    };

    let attempts = 0;
    let sentenceArray = [];

    // Initialize
    function init() {
        // Listen
        document.getElementById('listen-area').innerHTML = data.words.map(w => `<div><button onclick="speak('${w.es}')">🔊</button> ${w.es} - ${w.en}</div>`).join('');
        
        // Flashcards
        document.getElementById('flash-area').innerHTML = data.words.map((w, i) => `
            <div class="card" onclick="this.innerText='${w.es}'"> ${w.en} </div>
            <button class="btn-reset" onclick="this.previousElementSibling.innerText='${w.en}'">Reset</button>
        `).join('');

        // Quiz
        renderQuiz();
        
        // Build
        const s = data.sentences[0];
        document.getElementById('build-area').innerHTML = `<b>Task: ${s.en}</b><br><br>` + 
            data.words.map(w => `<span class="word-pill" onclick="addWord('${w.es}')">${w.es}</span>`).join('');
    }

    function addWord(w) {
        sentenceArray.push(w);
        document.getElementById('sentence-box').innerText = sentenceArray.join(' ');
    }

    function resetBuild() { sentenceArray = []; document.getElementById('sentence-box').innerText = ''; attempts = 0; }
    
    function checkBuild() {
        attempts++;
        if(sentenceArray.join(' ') === data.sentences[0].target.replace(/ /g, ' ')) alert("Correct!");
        else if(attempts >= 3) { alert("3 attempts reached. Resetting."); resetBuild(); }
        else alert("Try again!");
    }

    function renderQuiz() {
        const q = data.words[Math.floor(Math.random()*data.words.length)];
        document.getElementById('quiz-area').innerHTML = `<p>Translate: ${q.en}</p>` + 
            data.words.slice(0,3).map(o => `<button onclick="renderQuiz()">${o.es}</button>`).join(' ');
    }

    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.lang = 'es-ES'; window.speechSynthesis.speak(s); }
    init();
</script>
</body>
</html>
