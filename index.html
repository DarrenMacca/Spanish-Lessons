<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        .hidden { display: none; }
        .card { width: 140px; height: 90px; display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--primary); border-radius: 10px; margin: 8px; cursor: pointer; font-weight: bold; background: white; }
        .word-pill { display: inline-block; padding: 10px 18px; margin: 6px; background: #dbeafe; border-radius: 20px; cursor: pointer; border: 1px solid #bfdbfe; font-size: 14px; }
        .quiz-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .status-box { padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="dashboard-view">
        <h1>Dashboard</h1>
        <div class="status-box">Quiz Performance: <b id="quiz-status">Incomplete</b></div>
        <div class="status-box">Builder & Conversation: <b id="build-status">Incomplete</b></div>
        <h3 id="final-verdict">Course Status: Pending</h3>
        <button class="tab-btn" onclick="openApp()">Enter Learning Portal</button>
    </div>

    <div id="learning-view" class="hidden">
        <button onclick="goBack()" style="margin-bottom:20px;">← Back to Dashboard</button>
        <div style="background:#eff6ff; padding:10px; border-radius:8px; margin-bottom:15px;">
            Audio Speed: <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1">
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('listen')">1. Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">2. Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">3. Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">4. Building</button>
            <button class="tab-btn" onclick="showTab('conv')">5. Conversation</button>
        </div>
        
        <div class="tab-content" id="listen"><h3>Listen</h3><div id="listen-list"></div></div>
        <div class="tab-content hidden" id="flash"><h3>Flashcards</h3><div id="flash-area"></div></div>
        <div class="tab-content hidden" id="quiz"><h3>Quiz</h3><div id="score-board">Quiz Score: 0%</div><div id="quiz-area"></div></div>
        
        <!-- Shared Logic Area for Building & Conversation -->
        <div class="tab-content hidden" id="build">
            <h3 id="build-task"></h3>
            <p id="b-counter"></p>
            <button onclick="speak(window.currentTask.target)">🔊 Hear</button>
            <div class="word-bank"></div>
            <div class="sentence-box" style="padding:15px; border:2px dashed #cbd5e1; margin: 10px 0; min-height:40px;"></div>
            <button onclick="checkTask('build')">Submit</button>
            <button onclick="clearBox()">Reset</button>
            <button class="answer-btn hidden" onclick="revealAnswer()">Show Answer</button>
            <button onclick="nextTask('build')">Next</button>
            <span class="feedback"></span>
        </div>

        <div class="tab-content hidden" id="conv">
            <h3 id="conv-task"></h3>
            <p id="c-counter"></p>
            <div class="word-bank"></div>
            <div class="sentence-box" style="padding:15px; border:2px dashed #cbd5e1; margin: 10px 0; min-height:40px;"></div>
            <button onclick="checkTask('conv')">Submit</button>
            <button onclick="clearBox()">Reset</button>
            <button class="answer-btn hidden" onclick="revealAnswer()">Show Answer</button>
            <button onclick="nextTask('conv')">Next</button>
            <span class="feedback"></span>
        </div>
    </div>
</div>

<script>
    const data = {
        words: [{es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thank you'}, {es: 'Casa', en: 'House'}, {es: 'Yo', en: 'I'}, {es: 'Tu', en: 'You'}, {es: 'El', en: 'He'}, {es: 'Agua', en: 'Water'}, {es: 'Pan', en: 'Bread'}, {es: 'Libro', en: 'Book'}, {es: 'Amigo', en: 'Friend'}, {es: 'Feliz', en: 'Happy'}, {es: 'Comer', en: 'Eat'}, {es: 'Beber', en: 'Drink'}, {es: 'Donde', en: 'Where'}, {es: 'Esta', en: 'Is'}, {es: 'La', en: 'The'}],
        sentences: [{en: 'I eat bread', target: 'Yo Comer Pan'}, {en: 'The house is big', target: 'La Casa Grande'}],
        convos: [
            {en: 'A: Hello friend. B: Hello.', target: 'Hola Amigo Hola'},
            {en: 'A: Where is the bread? B: Here.', target: 'Donde Esta El Pan Aquí'},
            {en: 'A: You drink water? B: Yes, I drink.', target: 'Tu Beber Agua Yo Beber'},
            {en: 'A: The friend is happy. B: Yes.', target: 'El Amigo Feliz Si'},
            {en: 'A: I eat here. B: Thank you.', target: 'Yo Comer Aquí Gracias'}
        ]
    };

    let qTotal=0, qCorrect=0, bScore=0, cScore=0, bCount=1, cCount=1, bAtt=0, cAtt=0;

    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.rate = document.getElementById('rate').value; s.lang = 'es-MX'; speechSynthesis.speak(s); }
    function openApp() { document.getElementById('dashboard-view').classList.add('hidden'); document.getElementById('learning-view').classList.remove('hidden'); }
    function goBack() { document.getElementById('dashboard-view').classList.remove('hidden'); document.getElementById('learning-view').classList.add('hidden'); updateDashboard(); }
    
    function updateDashboard() {
        const qP = qTotal===0?0:Math.round((qCorrect/qTotal)*100);
        const bP = Math.round(((bScore+cScore)/15)*100);
        document.getElementById('quiz-status').innerText = qP >= 90 ? "Passed ("+qP+"%)" : "Retry ("+qP+"%)";
        document.getElementById('build-status').innerText = bP >= 90 ? "Passed ("+bP+"%)" : "Retry ("+bP+"%)";
        document.getElementById('final-verdict').innerText = (qP >= 90 && bP >= 90) ? "Course Status: PASSED" : "Course Status: Needs Improvement";
    }

    function renderTask(type) {
        const isB = type === 'build';
        const item = isB ? data.sentences[bCount-1] : data.convos[cCount-1];
        window.currentTask = item;
        document.getElementById(isB ? 'build-task' : 'conv-task').innerText = item.en;
        document.getElementById(isB ? 'b-counter' : 'c-counter').innerText = (isB?bCount:cCount) + "/5";
        document.querySelectorAll(isB ? '#build .word-bank' : '#conv .word-bank')[0].innerHTML = data.words.map(w => `<span class="word-pill" onclick="this.parentElement.nextElementSibling.innerText+=' '+ '${w.es}'">${w.es}</span>`).join('');
    }

    function checkTask(type) {
        const isB = type === 'build';
        const box = document.querySelectorAll(isB ? '#build .sentence-box' : '#conv .sentence-box')[0];
        const fb = document.querySelectorAll(isB ? '#build .feedback' : '#conv .feedback')[0];
        if(box.innerText.trim().replace(/\s+/g,' ') === currentTask.target.replace(/ /g,' ')) {
            if((isB ? bAtt : cAtt) === 0) isB ? bScore++ : cScore++;
            fb.innerText = "Correct!";
        } else {
            isB ? bAtt++ : cAtt++;
            fb.innerText = "Attempt: " + (isB ? bAtt : cAtt) + "/3";
            if((isB ? bAtt : cAtt) >= 3) document.querySelectorAll(isB ? '#build .answer-btn' : '#conv .answer-btn')[0].classList.remove('hidden');
        }
    }

    function nextTask(type) {
        if(type === 'build') { if(bCount<5) { bCount++; bAtt=0; renderTask('build'); } } 
        else { if(cCount<5) { cCount++; cAtt=0; renderTask('conv'); } }
    }
    
    function clearBox() { document.querySelector('.tab-content:not(.hidden) .sentence-box').innerText=''; }
    function revealAnswer() { document.querySelector('.tab-content:not(.hidden) .sentence-box').innerText = currentTask.target; }
    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

    // Init
    document.getElementById('listen-list').innerHTML = data.words.map(w => `<button onclick="speak('${w.es}')">🔊</button> ${w.es} - ${w.en}<br>`).join('');
    document.getElementById('flash-area').innerHTML = data.words.map(w => `<div class="card" onclick="this.innerText=(this.innerText=='${w.en}' ? '${w.es}' : '${w.en}')">${w.en}</div>`).join('');
    renderTask('build'); renderTask('conv');
</script>
</body>
</html>
