<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
 
<body>

<!-- HEADER + HERO -->
<div class="glass-header">
    <h1>Spanish Trainer</h1>
    <img src="images/dashboard-hero.png" 
         alt="Dashboard Hero" 
         class="dashboard-hero-img">
</div>

<!-- NAVIGATION -->
<nav class="glass-panel nav-bar">
    <button class="tab-btn active" data-tab="dashboard">
        <img src="images/dashboard.png" class="tab-icon"> Dashboard
    </button>
    <button class="tab-btn" data-tab="listen">
        <img src="images/listen.png" class="tab-icon"> Listen
    </button>
    <button class="tab-btn" data-tab="flash">
        <img src="images/flashcards.png" class="tab-icon"> Flashcards
    </button>
    <button class="tab-btn" data-tab="quiz">
        <img src="images/badge-quiz.png" class="tab-icon"> Quiz
    </button>
    <button class="tab-btn" data-tab="build">
        <img src="images/badge-build.png" class="tab-icon"> Build
    </button>
    <button class="tab-btn" data-tab="sentence">
        <img src="images/icon-sentence.png" class="tab-icon"> Sentence
    </button>
    <button class="tab-btn" data-tab="conversation">
        <img src="images/badge-conversation.png" class="tab-icon"> Conversation
    </button>
    <button class="tab-btn" data-tab="grammar">
        <img src="images/grammar.png" class="tab-icon"> Grammar
    </button>
</nav>


<!-- DASHBOARD TAB CONTENT -->
<div id="dashboard">

    <div class="dashboard-row">
        <div class="dash-left glass-panel">
            <label class="section-title">Audio Speed</label>
            <input type="range" id="rate" min="0.6" max="1.4" step="0.1" value="1">
        </div>

        <div class="dash-right glass-panel">
            <label class="section-title">Skill Level</label>
            <div class="level-buttons">
                <button class="pill" data-level="A1">A1</button>
                <button class="pill" data-level="A2">A2</button>
                <button class="pill" data-level="B1">B1</button>
                <button class="pill" data-level="B2">B2</button>
            </div>
        </div>
    </div>

    <div class="student-name-box glass-panel">
        <label class="section-title">Your name for certificates</label>
        <input id="student-name" class="input-field" type="text" placeholder="Enter your name">
        <button id="save-name-btn" class="pill">Save Name</button>
        <div id="name-status" class="name-status"></div>
    </div>

    <!-- PROGRESS METERS -->
    <div class="progress-section">

        <!-- QUIZ -->
        <div id="quiz-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/badge-quiz.png" class="progress-img">
                <label class="section-title">Quiz Progress</label>
                <span class="progress-number" id="quiz-number">0%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="quiz-progress"></div>
            </div>
        </div>

        <!-- BUILD -->
        <div id="build-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/badge-build.png" class="progress-img">
                <label class="section-title">Build Progress</label>
                <span class="progress-number" id="build-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="build-progress"></div>
            </div>
        </div>

        <!-- SENTENCE -->
        <div id="sentence-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-sentence.png" class="progress-img">
                <label class="section-title">Sentence Progress</label>
                <span class="progress-number" id="sentence-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="sentence-progress"></div>
            </div>
        </div>

        <!-- XP -->
        <div id="xp-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-xp.png" class="progress-img">
                <label class="section-title">XP Progress</label>
                <span class="progress-number" id="xp-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="xp-progress"></div>
            </div>
        </div>

        <!-- STREAK -->
        <div id="streak-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-streak.png" class="progress-img">
                <label class="section-title">Streak</label>
                <span class="progress-number" id="streak-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="streak-progress"></div>
            </div>
        </div>

        <!-- SCORE -->
        <div id="score-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-level.png" class="progress-img">
                <label class="section-title">Score Rating</label>
                <span class="progress-number" id="score-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="score-progress"></div>
            </div>
        </div>

        <!-- REVIEW -->
        <div id="review-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-review.png" class="progress-img">
                <label class="section-title">Due for Review</label>
                <span class="progress-number" id="review-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="review-progress"></div>
            </div>
        </div>
        
         <!-- RESET -->
        <div id="reset-tile" class="progress-tile glass-panel reset-tile">
    <div class="progress-icon-row">
        <img src="images/icon-reset.png" class="progress-img">
        <label class="section-title">Reset All Levels</label>
    </div>

    <button id="resetAllLevelsBtn" class="pill danger reset-btn">
        Reset Everything
    </button>
</div>



    </div>

    <div class="badge-section glass-panel">
        <h3>Your Badges</h3>
        <ul id="badge-list"></ul>
    </div>

</div>

<!-- OTHER TABS -->

<!-- LISTEN TAB -->
<div id="listen" class="hidden">
    <div id="listen-content"></div>
</div>

<!-- FLASHCARDS TAB -->
<div id="flash" class="hidden">
    <div id="flash-content"></div>
</div>

<!-- QUIZ TAB -->
<div id="quiz" class="hidden">
    <div id="quiz-content"></div>
</div>

<!-- BUILD TAB -->
<div id="build" class="hidden">
    <div id="build-content"></div>
</div>

<!-- SENTENCE TAB -->
<div id="sentence" class="hidden">
    <div id="sentence-content"></div>
</div>

<!-- CONVERSATION TAB -->
<div id="conversation" class="hidden">
    <div id="conversation-content"></div>
</div>

<!-- GRAMMAR TAB -->
<div id="grammar" class="hidden">
    <div id="grammar-content"></div>
</div>

<script src="wordbanks/A1.js"></script>
<script src="wordbanks/A2.js"></script>
<script src="wordbanks/B1.js"></script>
<script src="wordbanks/B2.js"></script>
<script src="app.js"></script>

</body>
</html>
