<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .wrapper { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-btn { padding: 10px 15px; cursor: pointer; border: none; background: #e2e8f0; border-radius: 6px; }
        .tab-btn.active { background: #2563eb; color: white; }
        .hidden { display: none; }
        .card-row { border: 1px solid #e2e8f0; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .word-pill { display: inline-block; padding: 8px 12px; margin: 4px; background: #dbeafe; border-radius: 6px; cursor: pointer; border: 1px solid #bfdbfe; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="dashboard">
        <h1>CEFR Training Dashboard</h1>
        <div id="levels-container"></div>
    </div>

    <div id="lesson-zone" class="hidden">
        <button onclick="goBack()">← Dashboard</button>
        <div style="margin: 20px 0;">
            <button class="tab-btn active" onclick="showTab('listen')">1. Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">2. Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">3. Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">4. Building</button>
        </div>

        <div id="listen" class="tab-content"><div id="vocab-list"></div></div>
        <div id="flash" class="tab-content hidden"><div id="flash-list"></div></div>
        <div id="quiz" class="tab-content hidden"><div id="quiz-area"></div></div>
        <div id="build" class="tab-content hidden">
            <h3 id="build-task"></h3>
            <div id="word-bank"></div>
            <div id="sentence-box" style="padding:20px; border:2px dashed #ccc; margin:20px 0; min-height:40px;"></div>
            <button onclick="resetBuild()">Reset</button>
        </div>
    </div>
</div>

<script>
    const data = {
        words: [
            {es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thank you'}, {es: 'Uno', en: 'One'}, {es: 'Rojo', en: 'Red'}, {es: 'Perro', en: 'Dog'}, 
            {es: 'Gato', en: 'Cat'}, {es: 'Casa', en: 'House'}, {es: 'Yo', en: 'I'}, {es: 'Tu', en: 'You'}, {es: 'El', en: 'He'}, 
            {es: 'Agua', en: 'Water'}, {es: 'Pan', en: 'Bread'}, {es: 'Sol', en: 'Sun'}, {es: 'Luz', en: 'Light'}, {es: 'Mar', en: 'Sea'},
            {es: 'Libro', en: 'Book'}, {es: 'Amigo', en: 'Friend'}, {es: 'Comer', en: 'Eat'}, {es: 'Beber', en: 'Drink'}, {es: 'Feliz', en: 'Happy'}
        ],
        sentences: [
            {en: 'I eat bread', target: ['Yo', 'Comer', 'Pan']}, 
            {en: 'The dog is happy', target: ['El', 'Perro', 'Feliz']},
            {en: 'You drink water', target: ['Tu', 'Beber', 'Agua']}, 
            {en: 'I am happy', target: ['Yo', 'Feliz']}
        ]
    };

    let quizUsed = [];

    function startLevel() {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('lesson-zone').classList.remove('hidden');
        
        document.getElementById('vocab-list').innerHTML = data.words.map(w => `<div><button onclick="speak('${w.es}')">🔊</button> ${w.es} - ${w.en}</div>`).join('');
        document.getElementById('flash-list').innerHTML = data.words.map(w => `<div class="card-row" onclick="this.innerHTML='<b>${w.es}</b>'"><span>${w.en}</span> <span>(Click for Spanish)</span></div>`).join('');
        
        initQuiz(); initBuild();
    }

    function initQuiz() {
        quizUsed = [];
        nextQuiz();
    }

    function nextQuiz() {
        if (quizUsed.length >= 10) { document.getElementById('quiz-area').innerHTML = "Quiz Complete!"; return; }
        let available = data.words.filter(w => !quizUsed.some(q => q.es === w.es));
        const q = available[Math.floor(Math.random()*available.length)];
        quizUsed.push(q);
        
        let opts = [q.es];
        while(opts.length < 4) {
            let r = data.words[Math.floor(Math.random()*data.words.length)].es;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        document.getElementById('quiz-area').innerHTML = `<p>Question ${quizUsed.length}: Translate "${q.en}"</p>` + opts.map(o => `<button onclick="nextQuiz()">${o}</button>`).join(' ');
    }

    function initBuild() {
        const s = data.sentences[Math.floor(Math.random()*data.sentences.length)];
        document.getElementById('build-task').innerText = "Translate: " + s.en;
        document.getElementById('word-bank').innerHTML = data.words.map(w => `<span class="word-pill" onclick="document.getElementById('sentence-box').innerText += '${w.es} '">${w.es}</span>`).join('');
    }

    function resetBuild() { document.getElementById('sentence-box').innerText = ''; }
    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.lang = 'es-ES'; window.speechSynthesis.speak(s); }
    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.remove('hidden'); event.target.classList.add('active'); }
    function goBack() { document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('lesson-zone').classList.add('hidden'); }
    document.getElementById('levels-container').innerHTML = `<div style="padding:15px; border:1px solid #ccc;"><button onclick="startLevel()">Start Beginner (A1)</button></div>`;
</script>
</body>
</html>
