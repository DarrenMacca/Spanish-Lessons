<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .wrapper { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-btn { padding: 10px 15px; cursor: pointer; border: none; background: #e2e8f0; border-radius: 6px; }
        .tab-btn.active { background: #2563eb; color: white; }
        .hidden { display: none; }
        .card { border: 2px solid #2563eb; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; background: #eff6ff; font-size: 1.5rem; font-weight: bold; margin-bottom: 10px;}
        .word-pill { display: inline-block; padding: 8px 12px; margin: 4px; background: #dbeafe; border-radius: 6px; cursor: pointer; border: 1px solid #bfdbfe; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="dashboard">
        <h1>CEFR Training Dashboard</h1>
        <div id="levels-container"></div>
    </div>

    <div id="lesson-zone" class="hidden">
        <button onclick="goBack()">← Dashboard</button>
        <h2 id="level-title"></h2>
        <div style="margin-bottom:20px;">
            <button class="tab-btn active" onclick="showTab('listen')">1. Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">2. Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">3. Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">4. Building</button>
        </div>

        <div id="listen" class="tab-content"><div id="vocab-list"></div></div>
        
        <div id="flash" class="tab-content hidden">
            <div class="card" id="flash-card" onclick="flipCard()">Click to Start</div>
            <button onclick="nextCard()">Next Word</button>
            <button onclick="resetFlash()">Reset</button>
        </div>

        <div id="quiz" class="tab-content hidden">
            <p id="quiz-q" style="font-weight:bold;"></p>
            <div id="quiz-options" style="display:flex; flex-direction:column; gap:10px;"></div>
            <button onclick="initQuiz()">Reset Quiz</button>
        </div>

        <div id="build" class="tab-content hidden">
            <p id="build-eng" style="font-weight:bold;"></p>
            <div id="word-bank"></div>
            <div id="sentence-box" style="padding:20px; border:2px dashed #ccc; margin-top:20px; min-height:40px; background:#fdfdfd;"></div>
            <button onclick="gradeBuilding()">Check</button>
            <button onclick="resetBuild()">Reset</button>
        </div>
    </div>
</div>

<script>
    const levels = [{ 
        id: 0, code: 'A1', title: 'Beginner', 
        words: [
            {es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thank you'}, {es: 'Uno', en: 'One'}, {es: 'Rojo', en: 'Red'}, {es: 'Perro', en: 'Dog'}, 
            {es: 'Gato', en: 'Cat'}, {es: 'Casa', en: 'House'}, {es: 'Yo', en: 'I'}, {es: 'Tu', en: 'You'}, {es: 'El', en: 'He'}, 
            {es: 'Agua', en: 'Water'}, {es: 'Pan', en: 'Bread'}, {es: 'Sol', en: 'Sun'}, {es: 'Luz', en: 'Light'}, {es: 'Mar', en: 'Sea'},
            {es: 'Libro', en: 'Book'}, {es: 'Amigo', en: 'Friend'}, {es: 'Comer', en: 'Eat'}, {es: 'Beber', en: 'Drink'}, {es: 'Feliz', en: 'Happy'}
        ],
        sentences: [{en: 'I eat bread', target: 'Yo comer pan'}]
    }];

    let currentLvl = 0, cardIdx = 0, isSpanish = false;

    function startLevel(id) {
        currentLvl = id;
        document.getElementById('level-title').innerText = levels[id].title;
        document.getElementById('vocab-list').innerHTML = levels[id].words.map(w => `<div style="margin:5px; padding:5px; border-bottom:1px solid #eee;"><button onclick="speak('${w.es}')">🔊</button> <b>${w.es}</b> - ${w.en}</div>`).join('');
        initFlash(); initQuiz(); initBuild();
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('lesson-zone').classList.remove('hidden');
    }

    function initFlash() { cardIdx = 0; isSpanish = false; document.getElementById('flash-card').innerText = levels[currentLvl].words[0].en; }
    function flipCard() { isSpanish = !isSpanish; document.getElementById('flash-card').innerText = isSpanish ? levels[currentLvl].words[cardIdx].es : levels[currentLvl].words[cardIdx].en; }
    function nextCard() { cardIdx = (cardIdx + 1) % levels[currentLvl].words.length; isSpanish = false; document.getElementById('flash-card').innerText = levels[currentLvl].words[cardIdx].en; }
    
    function initQuiz() {
        const target = levels[currentLvl].words[Math.floor(Math.random()*20)];
        document.getElementById('quiz-q').innerText = "Translate: " + target.en;
        let options = [target.es];
        while(options.length < 4) {
            let rnd = levels[currentLvl].words[Math.floor(Math.random()*20)].es;
            if(!options.includes(rnd)) options.push(rnd);
        }
        options.sort(() => Math.random() - 0.5);
        document.getElementById('quiz-options').innerHTML = options.map(opt => `<button onclick="alert('${opt === target.es ? 'Correct!' : 'Wrong, it was ' + target.es}')">${opt}</button>`).join('');
    }

    function initBuild() {
        document.getElementById('build-eng').innerText = "Sentence: " + levels[currentLvl].sentences[0].en;
        document.getElementById('word-bank').innerHTML = levels[currentLvl].words.map(w => `<span class="word-pill" onclick="document.getElementById('sentence-box').innerText += '${w.es} '">${w.es}</span>`).join('');
    }

    function resetBuild() { document.getElementById('sentence-box').innerText = ''; }
    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.lang = 'es-ES'; window.speechSynthesis.speak(s); }
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        event.target.classList.add('active');
    }
    function goBack() { document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('lesson-zone').classList.add('hidden'); }
    document.getElementById('levels-container').innerHTML = levels.map(l => `<div style="padding:15px; border:1px solid #ccc;"><button onclick="startLevel(${l.id})">${l.title}</button></div>`).join('');
</script>
</body>
</html>
