<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Portal</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 40px 20px; color: #334155; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .tab-btn { padding: 12px 24px; border: none; background: #e2e8f0; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .card-item { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .card-item:hover { border-color: var(--primary); }
        .word-pill { display: inline-block; padding: 10px 20px; margin: 6px; background: #eff6ff; border: 2px solid #dbeafe; border-radius: 30px; cursor: pointer; font-weight: 500; }
        .word-pill:hover { background: #dbeafe; }
        button { padding: 10px 20px; cursor: pointer; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="dashboard">
        <h1 class="text-2xl font-bold mb-6">Learning Dashboard</h1>
        <div id="levels-container"></div>
    </div>

    <div id="lesson-zone" class="hidden">
        <button onclick="goBack()" style="background:#64748b;">← Back to Dashboard</button>
        <div style="margin: 25px 0;">
            <button class="tab-btn active" onclick="showTab('listen')">Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">Building</button>
        </div>

        <div id="listen" class="tab-content"><div id="vocab-list"></div></div>
        <div id="flash" class="tab-content hidden"><div id="flash-list"></div></div>
        <div id="quiz" class="tab-content hidden">
            <div id="quiz-header" style="font-size: 1.2rem; margin-bottom: 20px;">Score: 0/10</div>
            <div id="quiz-area"></div>
        </div>
        <div id="build" class="tab-content hidden">
            <h3 id="build-task"></h3>
            <div id="word-bank"></div>
            <div id="sentence-box" style="padding:25px; background:#f1f5f9; border-radius:12px; margin:20px 0; min-height:50px; font-size: 1.2rem;"></div>
            <button onclick="checkBuild()">Submit</button>
            <button onclick="resetBuild()" style="background:#ef4444;">Reset</button>
        </div>
    </div>
</div>

<script>
    const data = {
        words: [{es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thank you'}, {es: 'Uno', en: 'One'}, {es: 'Rojo', en: 'Red'}, {es: 'Perro', en: 'Dog'}, {es: 'Gato', en: 'Cat'}, {es: 'Casa', en: 'House'}, {es: 'Yo', en: 'I'}, {es: 'Tu', en: 'You'}, {es: 'El', en: 'He'}, {es: 'Agua', en: 'Water'}, {es: 'Pan', en: 'Bread'}, {es: 'Sol', en: 'Sun'}, {es: 'Luz', en: 'Light'}, {es: 'Mar', en: 'Sea'}, {es: 'Libro', en: 'Book'}, {es: 'Amigo', en: 'Friend'}, {es: 'Comer', en: 'Eat'}, {es: 'Beber', en: 'Drink'}, {es: 'Feliz', en: 'Happy'}],
        sentences: [{en: 'I eat bread', target: 'Yo Comer Pan'}, {en: 'The dog is happy', target: 'El Perro Feliz'}, {en: 'You drink water', target: 'Tu Beber Agua'}, {en: 'I am happy', target: 'Yo Feliz'}]
    };

    let score = 0, attempts = 0, currentSentence = {};

    function startLevel() {
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('lesson-zone').classList.remove('hidden');
        document.getElementById('vocab-list').innerHTML = data.words.map(w => `<div class="card-item"><button onclick="speak('${w.es}')">🔊 Play</button> <span><b>${w.es}</b> - ${w.en}</span></div>`).join('');
        document.getElementById('flash-list').innerHTML = data.words.map((w, i) => `<div class="card-item"><span>${w.en}</span> <b id="c-${i}">???</b> <div><button onclick="document.getElementById('c-${i}').innerText='${w.es}'">Flip</button> <button onclick="document.getElementById('c-${i}').innerText='???'">Reset</button></div></div>`).join('');
        initQuiz(); initBuild();
    }

    function initQuiz() { 
        score = 0; renderQuiz(); 
    }

    function renderQuiz() {
        const q = data.words[Math.floor(Math.random()*data.words.length)];
        let opts = [q.es];
        while(opts.length < 4) { let r = data.words[Math.floor(Math.random()*data.words.length)].es; if(!opts.includes(r)) opts.push(r); }
        document.getElementById('quiz-area').innerHTML = `<h3 style="margin-bottom:20px;">Translate: "${q.en}"</h3>` + opts.sort().map(o => `<button style="margin:5px" onclick="if('${o}'=='${q.es}'){score++} renderQuiz(); document.getElementById('quiz-header').innerText='Score: '+score+'/10'">${o}</button>`).join(' ');
    }

    function initBuild() { currentSentence = data.sentences[Math.floor(Math.random()*data.sentences.length)]; document.getElementById('build-task').innerText = "Task: " + currentSentence.en; document.getElementById('word-bank').innerHTML = data.words.map(w => `<span class="word-pill" onclick="document.getElementById('sentence-box').innerText += '${w.es} '">${w.es}</span>`).join(''); }
    function checkBuild() { attempts++; if(document.getElementById('sentence-box').innerText.trim() === currentSentence.target.replace(/ /g, '  ').trim()) alert("Perfect!"); else if(attempts >= 3) { alert("3 attempts reached. Resetting."); resetBuild(); } else alert("Try again!"); }
    function resetBuild() { attempts = 0; document.getElementById('sentence-box').innerText = ''; }
    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.lang = 'es-ES'; window.speechSynthesis.speak(s); }
    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.remove('hidden'); event.target.classList.add('active'); }
    function goBack() { document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('lesson-zone').classList.add('hidden'); }
    document.getElementById('levels-container').innerHTML = `<div class="card-item"><span><b>Beginner A1</b> - Vocabulary & Syntax</span> <button onclick="startLevel()">Start Training</button></div>`;
</script>
</body>
</html>
