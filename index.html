<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        .hidden { display: none; }
        .status-box { padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #e2e8f0; }
        .quiz-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .word-pill { display: inline-block; padding: 10px 18px; margin: 6px; background: #dbeafe; border-radius: 20px; cursor: pointer; border: 1px solid #bfdbfe; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="dashboard-view">
        <h1>Dashboard</h1>
        <div id="status-container">
            <div class="status-box">Quiz Performance: <b id="quiz-status">Incomplete</b></div>
            <div class="status-box">Builder Performance: <b id="build-status">Incomplete</b></div>
            <h3 id="final-verdict">Course Status: Pending Completion</h3>
        </div>
        <button class="tab-btn" onclick="openApp()">Enter Learning Portal</button>
    </div>

    <div id="learning-view" class="hidden">
        <button onclick="goBack()" style="margin-bottom:20px;">← Return to Dashboard</button>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('quiz')">3. Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">4. Building</button>
        </div>
        
        <div class="tab-content" id="quiz">
            <div id="score-board">Quiz Score: 0%</div>
            <div id="quiz-area"></div>
        </div>
        <div class="tab-content hidden" id="build">
            <h3 id="build-task"></h3>
            <p id="progress-counter">Task 1/10 | Session Score: 0%</p>
            <div id="word-bank"></div>
            <div id="sentence-box" style="padding:15px; border:2px dashed #cbd5e1; min-height:40px; margin: 10px 0;"></div>
            <button onclick="checkBuild()">Submit</button>
            <button id="show-answer-btn" class="hidden" onclick="revealAnswer()">Show Answer</button>
            <button id="next-btn" onclick="nextTask()">Next Task</button>
        </div>
    </div>
</div>

<script>
    const data = {
        words: [{es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thank you'}, {es: 'Casa', en: 'House'}, {es: 'Yo', en: 'I'}, {es: 'Tu', en: 'You'}, {es: 'El', en: 'He'}, {es: 'Agua', en: 'Water'}, {es: 'Pan', en: 'Bread'}, {es: 'Libro', en: 'Book'}, {es: 'Amigo', en: 'Friend'}, {es: 'Feliz', en: 'Happy'}, {es: 'Comer', en: 'Eat'}, {es: 'Beber', en: 'Drink'}, {es: 'Sol', en: 'Sun'}, {es: 'Luz', en: 'Light'}, {es: 'Mar', en: 'Sea'}, {es: 'Tienda', en: 'Store'}, {es: 'Calle', en: 'Street'}, {es: 'Mapa', en: 'Map'}, {es: 'Donde', en: 'Where'}],
        sentences: [{en: 'I eat bread', target: 'Yo Comer Pan'}, {en: 'The friend is happy', target: 'El Amigo Feliz'}, {en: 'Where is the store', target: 'Donde Esta La Tienda'}, {en: 'You drink water', target: 'Tu Beber Agua'}, {en: 'The book is red', target: 'El Libro Rojo'}, {en: 'I am happy', target: 'Yo Feliz'}, {en: 'The house is big', target: 'La Casa Grande'}, {en: 'The map is here', target: 'El Mapa Aquí'}, {en: 'He eats bread', target: 'El Comer Pan'}, {en: 'The street is big', target: 'La Calle Grande'}]
    };

    let qTotal = 0, qCorrect = 0, bScore = 0, bCount = 1, bAttempts = 0, bFinished = false, qFinished = false;

    function openApp() { document.getElementById('dashboard-view').classList.add('hidden'); document.getElementById('learning-view').classList.remove('hidden'); }
    
    function goBack() { 
        document.getElementById('dashboard-view').classList.remove('hidden'); 
        document.getElementById('learning-view').classList.add('hidden');
        updateDashboard();
    }

    function updateDashboard() {
        const qPercent = qTotal === 0 ? 0 : Math.round((qCorrect/qTotal)*100);
        const bPercent = Math.round((bScore/10)*100);
        
        document.getElementById('quiz-status').innerText = qPercent >= 90 ? "Passed ("+qPercent+"%)" : "Retry Quiz ("+qPercent+"%)";
        document.getElementById('build-status').innerText = bPercent >= 90 ? "Passed ("+bPercent+"%)" : "Retry Builder ("+bPercent+"%)";
        
        if(qPercent >= 90 && bPercent >= 90) {
            document.getElementById('final-verdict').innerText = "Course Status: 🎉 PASSED";
            document.getElementById('final-verdict').style.color = "green";
        } else {
            document.getElementById('final-verdict').innerText = "Course Status: Needs Improvement";
            document.getElementById('final-verdict').style.color = "red";
        }
    }

    function renderQuiz() { 
        document.getElementById('quiz-area').innerHTML = data.words.slice(0,10).map((w,i) => `
            <div class="quiz-row"><span>${w.en}</span>
            <input id="q${i}" onkeydown="if(event.key==='Enter') checkQuiz('${w.es}', 'q${i}', 'f${i}')"> 
            <span id="f${i}"></span></div>`).join(''); 
    }

    function checkQuiz(ans, inputId, feedId) {
        qTotal++; const isCorrect = document.getElementById(inputId).value.toLowerCase() === ans.toLowerCase();
        if(isCorrect) qCorrect++;
        document.getElementById(feedId).innerText = isCorrect ? "✅" : "❌";
        document.getElementById('score-board').innerText = "Quiz Score: " + Math.round((qCorrect/qTotal)*100) + "%";
    }

    function renderBuild() {
        const task = data.sentences[bCount - 1];
        document.getElementById('build-task').innerText = "Build: " + task.en;
        document.getElementById('word-bank').innerHTML = data.words.map(w => `<span class="word-pill" onclick="document.getElementById('sentence-box').innerText+=' ' + '${w.es}'">${w.es}</span>`).join('');
    }

    function checkBuild() {
        if(document.getElementById('sentence-box').innerText.trim().replace(/\s+/g, ' ') === data.sentences[bCount-1].target.replace(/ /g, ' ')) {
            if(bAttempts === 0) bScore++;
            alert("Correct!");
        } else { bAttempts++; if(bAttempts >= 3) document.getElementById('show-answer-btn').classList.remove('hidden'); }
    }

    function nextTask() {
        if(bCount >= 10) { alert("Session complete! Returning to Dashboard."); goBack(); } 
        else { bCount++; bAttempts = 0; document.getElementById('sentence-box').innerText = ''; renderBuild(); }
    }

    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    
    renderQuiz(); renderBuild();
</script>
</body>
</html>
