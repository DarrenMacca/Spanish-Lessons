<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Portal</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .wrapper { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-btn { padding: 10px 15px; cursor: pointer; border: none; background: #e2e8f0; border-radius: 6px; }
        .tab-btn.active { background: #2563eb; color: white; }
        .hidden { display: none; }
        .card { border: 2px solid #2563eb; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; background: #eff6ff; font-size: 1.8rem; font-weight: bold; }
        .word-pill { display: inline-block; padding: 8px 16px; margin: 5px; background: #dbeafe; border: 1px solid #bfdbfe; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="dashboard">
        <h1>CEFR Training Dashboard</h1>
        <div id="levels-container"></div>
    </div>

    <div id="lesson-zone" class="hidden">
        <button onclick="goBack()">← Back</button>
        <h2 id="level-title"></h2>
        <div style="margin-bottom:20px;">
            <button class="tab-btn active" onclick="showTab('listen')">1. Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">2. Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">3. Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">4. Building</button>
        </div>

        <div id="listen" class="tab-content"><div id="vocab-list" style="display:flex; flex-wrap:wrap; gap:10px;"></div></div>
        
        <div id="flash" class="tab-content hidden">
            <div class="card" id="flash-card" onclick="nextCard()">Click to Start</div>
        </div>

        <div id="quiz" class="tab-content hidden">
            <p id="quiz-q"></p>
            <input type="text" id="quiz-ans" style="padding:10px; width:100%;">
            <button onclick="gradeQuiz()">Submit</button>
        </div>

        <div id="build" class="tab-content hidden">
            <p id="build-eng" style="font-weight:bold;"></p>
            <div id="word-bank" style="margin:20px 0;"></div>
            <div id="sentence-box" style="min-height:50px; border-bottom:2px solid #333; margin-top:20px; font-size:1.2rem;"></div>
            <button onclick="gradeBuilding()" style="margin-top:20px;">Finalize Sentence</button>
        </div>
    </div>
</div>

<script>
    const levels = [
        { id: 0, code: 'A1', title: 'Beginner', words: ['Hola', 'Yo', 'soy', 'Juan'], target: 'Hello, I am Juan', solution: 'Hola yo soy Juan', q: 'Translate "Hello"', a: 'Hola' },
        { id: 1, code: 'A2', title: 'Elementary', words: ['Donde', 'esta', 'la', 'tienda'], target: 'Where is the store', solution: 'Donde esta la tienda', q: 'Translate "The store"', a: 'La tienda' }
    ];

    let currentLvl = 0, cardIdx = 0, progress = parseInt(localStorage.getItem('cefr_progress')) || 0;

    function renderDashboard() {
        document.getElementById('levels-container').innerHTML = levels.map(l => `
            <div style="padding:15px; border:1px solid #ccc; margin:10px 0;" class="${l.id > progress ? 'hidden' : ''}">
                <strong>${l.code}: ${l.title}</strong>
                <button onclick="startLevel(${l.id})">Start Learning</button>
            </div>
        `).join('');
    }

    function startLevel(id) {
        currentLvl = id;
        document.getElementById('level-title').innerText = levels[id].title;
        document.getElementById('vocab-list').innerHTML = levels[id].words.map(w => `<span class="word-pill" onclick="speak('${w}')">${w} 🔊</span>`).join('');
        document.getElementById('flash-card').innerText = levels[id].words[0];
        document.getElementById('quiz-q').innerText = levels[id].q;
        document.getElementById('build-eng').innerText = "English: " + levels[id].target;
        document.getElementById('word-bank').innerHTML = levels[id].words.map(w => `<span class="word-pill" onclick="addWord('${w}')">${w}</span>`).join('');
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('lesson-zone').classList.remove('hidden');
    }

    function addWord(w) { document.getElementById('sentence-box').innerText += w + " "; }
    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.lang = 'es-ES'; window.speechSynthesis.speak(s); }
    function nextCard() { cardIdx = (cardIdx + 1) % levels[currentLvl].words.length; document.getElementById('flash-card').innerText = levels[currentLvl].words[cardIdx]; }
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        event.target.classList.add('active');
    }

    function gradeQuiz() { alert(document.getElementById('quiz-ans').value.toLowerCase() === levels[currentLvl].a.toLowerCase() ? "Correct!" : "Try again."); }
    function gradeBuilding() {
        if(document.getElementById('sentence-box').innerText.trim().toLowerCase() === levels[currentLvl].solution.toLowerCase()) {
            alert("Perfect!"); progress++; localStorage.setItem('cefr_progress', progress); goBack();
        } else alert("Not quite right.");
    }
    function goBack() { document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('lesson-zone').classList.add('hidden'); renderDashboard(); }

    renderDashboard();
</script>
</body>
</html>
