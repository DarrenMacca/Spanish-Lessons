<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        .hidden { display: none; }
        .card { width: 140px; height: 90px; display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--primary); border-radius: 10px; margin: 8px; cursor: pointer; font-weight: bold; background: white; }
        .word-pill { display: inline-block; padding: 10px 18px; margin: 6px; background: #dbeafe; border-radius: 20px; cursor: pointer; border: 1px solid #bfdbfe; font-size: 14px; }
        .quiz-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .global-controls { background: #eff6ff; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="dashboard-view">
        <h1>Dashboard</h1>
        <p>Skill Level: <b>A1 Elementary</b></p>
        <p id="score-summary">Overall Quiz Score: 0%</p>
        <button class="tab-btn" onclick="openApp()" style="margin-top:20px;">Enter Learning Portal</button>
    </div>

    <div id="learning-view" class="hidden">
        <button onclick="goBack()" style="margin-bottom:20px;">← Back to Dashboard</button>
        <div class="global-controls">Audio Speed: <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1"></div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('listen')">1. Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">2. Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">3. Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">4. Building</button>
        </div>
        
        <div class="tab-content" id="listen"><h3>Listen</h3><div id="listen-list"></div></div>
        <div class="tab-content hidden" id="flash"><h3>Flashcards</h3><div id="flash-area"></div></div>
        <div class="tab-content hidden" id="quiz">
            <div id="score-board" style="font-weight:bold; margin-bottom:15px;">Overall Score: 0%</div>
            <button onclick="resetQuiz()">Reset Quiz</button>
            <div id="quiz-area"></div>
        </div>
        <div class="tab-content hidden" id="build">
            <h3 id="build-task"></h3>
            <p id="progress-counter">Task 1/10 | Session Score: 0%</p>
            <button onclick="speak(window.currentTask.target)">🔊 Hear Sentence</button>
            <div id="word-bank" style="margin:20px 0; display:flex; flex-wrap:wrap;"></div>
            <div id="sentence-box" style="padding:15px; border:2px dashed #cbd5e1; min-height:40px; margin-bottom:10px;"></div>
            <button onclick="checkBuild()">Submit Attempt</button>
            <button onclick="clearCurrentBox()">Clear Box</button>
            <button id="next-btn" onclick="nextTask()">Next Task</button>
            <span id="feedback" style="margin-left:15px; font-weight:bold;"></span>
            <button id="show-answer-btn" class="hidden" onclick="revealAnswer()" style="background:#f59e0b; color:white; border:none; padding:10px; border-radius:8px;">Show Answer</button>
        </div>
    </div>
</div>

<script>
    const data = {
        words: [{es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thank you'}, {es: 'Casa', en: 'House'}, {es: 'Yo', en: 'I'}, {es: 'Tu', en: 'You'}, {es: 'El', en: 'He'}, {es: 'Agua', en: 'Water'}, {es: 'Pan', en: 'Bread'}, {es: 'Libro', en: 'Book'}, {es: 'Amigo', en: 'Friend'}, {es: 'Feliz', en: 'Happy'}, {es: 'Comer', en: 'Eat'}, {es: 'Beber', en: 'Drink'}, {es: 'Sol', en: 'Sun'}, {es: 'Luz', en: 'Light'}, {es: 'Mar', en: 'Sea'}, {es: 'Tienda', en: 'Store'}, {es: 'Calle', en: 'Street'}, {es: 'Mapa', en: 'Map'}, {es: 'Donde', en: 'Where'}, {es: 'La', en: 'The'}, {es: 'Esta', en: 'Is'}, {es: 'Rojo', en: 'Red'}, {es: 'Aquí', en: 'Here'}, {es: 'Grande', en: 'Big'}],
        sentences: [{en: 'I eat bread', target: 'Yo Comer Pan'}, {en: 'The friend is happy', target: 'El Amigo Feliz'}, {en: 'Where is the store', target: 'Donde Esta La Tienda'}, {en: 'You drink water', target: 'Tu Beber Agua'}, {en: 'The book is red', target: 'El Libro Rojo'}, {en: 'I am happy', target: 'Yo Feliz'}, {en: 'The house is big', target: 'La Casa Grande'}, {en: 'The map is here', target: 'El Mapa Aquí'}, {en: 'He eats bread', target: 'El Comer Pan'}, {en: 'The street is big', target: 'La Calle Grande'}]
    };

    let totalQs = 0, correctQs = 0, buildAttempts = 0, buildCount = 1, buildScore = 0;

    function openApp() { document.getElementById('dashboard-view').classList.add('hidden'); document.getElementById('learning-view').classList.remove('hidden'); }
    function goBack() { document.getElementById('dashboard-view').classList.remove('hidden'); document.getElementById('learning-view').classList.add('hidden'); updateDashboard(); }
    function updateDashboard() {
        const score = totalQs === 0 ? 0 : Math.round((correctQs/totalQs)*100);
        document.getElementById('score-summary').innerText = "Overall Quiz Score: " + score + "%";
        document.getElementById('status-msg').innerText = score >= 90 ? "🎉 Congratulations! You have passed the course!" : "Keep practicing to reach 90%!";
    }

    function init() {
        document.getElementById('listen-list').innerHTML = data.words.map(w => `<div><button onclick="speak('${w.es}')">🔊</button> ${w.es} - ${w.en}</div>`).join('');
        document.getElementById('flash-area').innerHTML = data.words.map(w => `<div class="card" onclick="this.innerText=(this.innerText=='${w.en}' ? '${w.es}' : '${w.en}'); if(this.innerText=='${w.es}') speak('${w.es}')">${w.en}</div>`).join('');
        renderQuiz(); renderBuild();
    }

    function renderQuiz() { document.getElementById('quiz-area').innerHTML = data.words.slice(0,10).map((w,i) => `<div class="quiz-row"><span>${w.en}</span><input id="q${i}"> <button onclick="checkQuiz('${w.es}', 'q${i}', 'f${i}')">Submit</button> <span id="f${i}"></span></div>`).join(''); }
    function checkQuiz(ans, inputId, feedId) {
        totalQs++;
        const isCorrect = document.getElementById(inputId).value.toLowerCase() === ans.toLowerCase();
        if(isCorrect) correctQs++;
        document.getElementById(feedId).innerText = isCorrect ? "✅" : "❌";
        document.getElementById('score-board').innerText = "Overall Score: " + Math.round((correctQs/totalQs)*100) + "%";
    }

    function renderBuild() {
        window.currentTask = data.sentences[buildCount - 1];
        document.getElementById('build-task').innerText = "Build: " + currentTask.en;
        document.getElementById('progress-counter').innerText = `Task ${buildCount}/10 | Session Score: ${Math.round((buildScore/(buildCount-1 || 1))*100)}%`;
        document.getElementById('word-bank').innerHTML = data.words.map(w => `<span class="word-pill" onclick="document.getElementById('sentence-box').innerText+=' ' + '${w.es}'">${w.es}</span>`).join('');
    }

    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.rate = document.getElementById('rate').value; s.lang = 'es-MX'; window.speechSynthesis.speak(s); }
    function checkBuild() {
        if(document.getElementById('sentence-box').innerText.trim().replace(/\s+/g, ' ') === window.currentTask.target.replace(/ /g, ' ')) { 
            document.getElementById('feedback').innerText = "Correct!"; 
            if(buildAttempts === 0) buildScore++;
        } else { 
            buildAttempts++;
            document.getElementById('feedback').innerText = "Incorrect (" + buildAttempts + "/3)"; 
            if(buildAttempts >= 3) { document.getElementById('show-answer-btn').classList.remove('hidden'); document.getElementById('feedback').innerText = "Max attempts reached."; }
        }
    }
    function clearCurrentBox() { document.getElementById('sentence-box').innerText = ''; }
    function nextTask() {
        if (buildCount >= 10) { alert("Session complete! Returning to Dashboard."); goBack(); buildCount = 1; buildScore = 0; } 
        else { buildCount++; buildAttempts = 0; document.getElementById('sentence-box').innerText = ''; document.getElementById('feedback').innerText = ''; document.getElementById('show-answer-btn').classList.add('hidden'); renderBuild(); }
    }
    function revealAnswer() { document.getElementById('sentence-box').innerText = window.currentTask.target; }
    function resetQuiz() { totalQs = 0; correctQs = 0; document.getElementById('score-board').innerText = "Overall Score: 0%"; renderQuiz(); }
    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.remove('hidden'); event.target.classList.add('active'); }
    init();
</script>
</body>
</html>
