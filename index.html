<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish Lessons — CEFR Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- ============================================================
     TOP NAVIGATION
============================================================ -->
<div class="top-nav glass-panel">
    <button class="tab-btn" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="listen">Listen</button>
    <button class="tab-btn" data-tab="flash">Flashcards</button>
    <button class="tab-btn" data-tab="quiz">Quiz</button>
    <button class="tab-btn" data-tab="build">Build</button>
    <button class="tab-btn" data-tab="sentence">Sentence</button>
    <button class="tab-btn" data-tab="conversation">Conversation</button>
    <button class="tab-btn" data-tab="grammar">Grammar</button>
</div>

<!-- ============================================================
     DASHBOARD TAB
============================================================ -->
<div id="dashboard" class="tab-content">

    <div class="glass-panel" style="margin-bottom:16px;">
        <h2>Welcome to Spanish Lessons</h2>
        <p>Train vocabulary, grammar, listening, flashcards, quizzes and sentence building.</p>
    </div>

    <!-- STUDENT NAME -->
    <div class="glass-panel" style="margin-bottom:16px;">
        <label>Your Name:</label>
        <input id="student-name" type="text" placeholder="Enter your name">
        <button id="save-name-btn" class="primary-btn">Save</button>
        <div id="name-status" style="margin-top:8px;opacity:0.8;"></div>
    </div>

    <!-- SPEECH RATE -->
    <div class="glass-panel" style="margin-bottom:16px;">
        <label>Speech Rate:</label>
        <input id="rate" type="range" min="0.6" max="1.4" step="0.1">
    </div>

    <!-- CEFR LEVEL SELECTOR -->
    <div class="glass-panel" style="margin-bottom:16px;">
        <h3>Select CEFR Level</h3>
        <div style="display:flex;gap:8px;">
            <button class="level-btn" data-level="A1">A1</button>
            <button class="level-btn" data-level="A2">A2</button>
            <button class="level-btn" data-level="B1">B1</button>
            <button class="level-btn" data-level="B2">B2</button>
        </div>
    </div>

    <!-- ============================================================
         PROGRESS DASHBOARD
    ============================================================ -->
    <div class="progress-section">

        <!-- QUIZ -->
        <div class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <span class="progress-icon gradient-a1">📘</span>
                <label class="section-title">Quiz Progress</label>
                <span class="progress-number" id="quiz-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="quiz-progress"></div>
            </div>
        </div>

        <!-- BUILD -->
        <div class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <span class="progress-icon gradient-a2">🧩</span>
                <label class="section-title">Build Progress</label>
                <span class="progress-number" id="build-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="build-progress"></div>
            </div>
        </div>

        <!-- SENTENCE -->
        <div class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <span class="progress-icon gradient-b1">✏️</span>
                <label class="section-title">Sentence Progress</label>
                <span class="progress-number" id="sentence-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="sentence-progress"></div>
            </div>
        </div>

        <!-- XP -->
        <div class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <svg class="progress-svg xp-icon" viewBox="0 0 24 24">
                    <path d="M12 2C9 5 8 7.5 8 9.5C8 12 9.5 13.5 12 15C14.5 13.5 16 12 16 9.5C16 7.5 15 5 12 2Z" />
                </svg>
                <label class="section-title">XP Progress</label>
                <span class="progress-number" id="xp-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="xp-progress"></div>
            </div>
        </div>

        <!-- STREAK -->
        <div class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <span class="progress-icon gradient-a2">⚡</span>
                <label class="section-title">Streak</label>
                <span class="progress-number" id="streak-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="streak-progress"></div>
            </div>
        </div>

        <!-- SCORE -->
        <div class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <span class="progress-icon gradient-b1">⭐</span>
                <label class="section-title">Score Rating</label>
                <span class="progress-number" id="score-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="score-progress"></div>
            </div>
        </div>

        <!-- REVIEW -->
        <div class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <span class="progress-icon gradient-b2">⏳</span>
                <label class="section-title">Due for Review</label>
                <span class="progress-number" id="review-number">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="review-progress"></div>
            </div>
        </div>

    </div>

    <!-- BADGES -->
    <div class="badge-section glass-panel">
        <h3>Your Badges</h3>
        <ul id="badge-list"></ul>
    </div>

</div>

<!-- ============================================================
     OTHER TABS
============================================================ -->
<div id="listen" class="tab-content hidden"></div>
<div id="flash" class="tab-content hidden"></div>
<div id="quiz" class="tab-content hidden"></div>
<div id="build" class="tab-content hidden"></div>

<!-- Sentence BEFORE Conversation -->
<div id="sentence" class="tab-content hidden"></div>
<div id="conversation" class="tab-content hidden"></div>

<div id="grammar" class="tab-content hidden"></div>

<!-- ============================================================
     SCRIPTS
============================================================ -->
<script src="wordbanks/A1.js"></script>
<script src="wordbanks/A2.js"></script>
<script src="wordbanks/B1.js"></script>
<script src="wordbanks/B2.js"></script>
<script src="app.js"></script>

</body>
</html>
