<!-- Update the Quiz Content section in your HTML with these additions -->
<div id="content-quiz" class="p-6 space-y-6">
    <div id="quiz-interactive-body" class="space-y-6"></div>
    
    <div id="quiz-actions" class="flex gap-2">
        <button id="submit-btn" onclick="evaluateQuiz()" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition shadow">Submit My Answers</button>
        <button id="reset-btn" onclick="resetQuiz()" class="px-6 py-3 bg-slate-200 hover:bg-slate-300 rounded-xl font-bold text-slate-700 transition">Reset</button>
    </div>
    
    <div id="retry-warning" class="hidden text-center text-sm font-semibold text-rose-600 italic"></div>
    <div id="quiz-result-banner" class="hidden p-4 rounded-xl text-center font-bold"></div>
</div>

<!-- Add these modifications to your <script> section -->
<script>
    let retryCount = 0; // Track attempts

    function resetQuiz() {
        if (retryCount >= 3) return; // Hard limit

        // Clear radio buttons
        document.querySelectorAll('input[type="radio"]').forEach(el => el.checked = false);
        
        // Clear word builder selections
        selectedSentenceWords = {}; 
        lessonData[activeId].sentences.forEach((_, sIdx) => {
            selectedSentenceWords[sIdx] = [];
            document.getElementById(`sentence-target-${sIdx}`).innerHTML = `<span class="text-slate-400 text-xs italic pointer-events-none">Click words below to assemble your answer...</span>`;
            // Reset button styles
            document.querySelectorAll(`[id^="word-btn-${sIdx}"]`).forEach(btn => {
                btn.className = "bg-white border border-slate-300 text-slate-800 text-sm font-semibold px-3 py-2 rounded-xl shadow-sm hover:bg-slate-100 transition active:scale-95";
            });
        });

        // Hide banner and increment retry counter
        document.getElementById('quiz-result-banner').classList.add('hidden');
        retryCount++;
        
        const remaining = 3 - retryCount;
        const warning = document.getElementById('retry-warning');
        warning.classList.remove('hidden');
        warning.innerText = `Attempts remaining: ${remaining}`;

        if (remaining === 0) {
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('reset-btn').classList.add('hidden');
            warning.innerText = "Attempts exhausted. Please review your Flashcards and Audio before trying again.";
        }
    }

    function evaluateQuiz() {
        // ... (Keep existing evaluation logic) ...
        
        // After scoring, ensure the UI reflects potential failure
        if (finalPercent < 90) {
            document.getElementById('retry-warning').classList.remove('hidden');
            document.getElementById('retry-warning').innerText = `Score below 90%. You can reset the quiz ${3 - retryCount} more times.`;
        }
    }

    // Update your loadLesson function to reset the counter when opening a new lesson
    function loadLesson(id) {
        activeId = id; 
        retryCount = 0; // Reset counter on load
        document.getElementById('submit-btn').classList.remove('hidden');
        document.getElementById('reset-btn').classList.remove('hidden');
        document.getElementById('retry-warning').classList.add('hidden');
        // ... (existing load logic) ...
    }
</script>
