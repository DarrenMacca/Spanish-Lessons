<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ============================================================
     HEADER + HERO
============================================================ -->
<div class="glass-header">
    <h1>Spanish Trainer</h1>
    <img src="images/dashboard-hero.png" 
         alt="Dashboard Hero" 
         class="dashboard-hero-img">
</div>

<!-- ============================================================
     NAVIGATION (Corrected IDs, dashboard preserved)
============================================================ -->
<nav class="glass-panel nav-bar">
    <button id="btn-dashboard" class="tab-btn active" data-tab="dashboard">
        <img src="images/dashboard.png" class="tab-icon"> Dashboard
    </button>
    <button id="btn-listen" class="tab-btn" data-tab="listen">
        <img src="images/listen.png" class="tab-icon"> Listen
    </button>
    <button id="btn-flashcards" class="tab-btn" data-tab="flashcards">
        <img src="images/flashcards.png" class="tab-icon"> Flashcards
    </button>
    <button id="btn-quiz" class="tab-btn" data-tab="quiz">
        <img src="images/badge-quiz.png" class="tab-icon"> Quiz
    </button>
    <button id="btn-build" class="tab-btn" data-tab="build">
        <img src="images/badge-build.png" class="tab-icon"> Build
    </button>
    <button id="btn-sentence" class="tab-btn" data-tab="sentence">
        <img src="images/icon-sentence.png" class="tab-icon"> Sentence
    </button>
    <button id="btn-conversation" class="tab-btn" data-tab="conversation">
        <img src="images/badge-conversation.png" class="tab-icon"> Conversation
    </button>
    <button id="btn-practice" class="tab-btn" data-tab="practice">
        <img src="images/grammar.png" class="tab-icon"> Practice
    </button>
    <button id="btn-review" class="tab-btn" data-tab="review">
        <img src="images/icon-review.png" class="tab-icon"> Review
    </button>
    <button id="btn-achievements" class="tab-btn" data-tab="achievements">
        <img src="images/icon-level.png" class="tab-icon"> Achievements
    </button>
</nav>

<!-- ============================================================
     DASHBOARD TAB (FIXED)
============================================================ -->
<div id="tab-dashboard" class="tab-page">

    <div class="dashboard-row">
        <div class="dash-left glass-panel">
            <label class="section-title">Audio Speed</label>
            <input type="range" id="rate" min="0.6" max="1.4" step="0.1" value="1">
        </div>

        <div class="dash-right glass-panel">
            <label class="section-title">Skill Level</label>
            <div class="level-buttons">
                <button class="pill" data-level="A1">A1</button>
                <button class="pill" data-level="A2">A2</button>
                <button class="pill" data-level="B1">B1</button>
                <button class="pill" data-level="B2">B2</button>
            </div>
        </div>
    </div>

    <!-- ⭐ Category selector moved OUTSIDE dashboard-row -->
    <div class="glass-panel">
        <label class="section-title">Category</label>
        <select id="categorySelect" class="pill-input">
            <option value="Daily Life">Daily Life</option>
            <option value="Family">Family</option>
            <option value="Food & Drink">Food & Drink</option>
            <option value="Travel">Travel</option>
            <option value="Connectors">Connectors</option>
            <option value="Numbers">Numbers</option>
        </select>
    </div>

    <!-- rest of dashboard unchanged -->


    <div class="student-name-box glass-panel">
        <label class="section-title">Your name for certificates</label>
        <input id="student-name" class="input-field" type="text" placeholder="Enter your name">
        <button id="save-name-btn" class="pill">Save Name</button>
        <div id="name-status" class="name-status"></div>
    </div>

    <div class="progress-section">

        <div id="quiz-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/badge-quiz.png" class="progress-img">
                <label class="section-title">Quiz Progress</label>
                <span class="progress-number" id="quiz-number">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="quiz-progress"></div></div>
        </div>

        <div id="build-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/badge-build.png" class="progress-img">
                <label class="section-title">Build Progress</label>
                <span class="progress-number" id="build-number">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="build-progress"></div></div>
        </div>

        <div id="sentence-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-sentence.png" class="progress-img">
                <label class="section-title">Sentence Progress</label>
                <span class="progress-number" id="sentence-number">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="sentence-progress"></div></div>
        </div>

        <div id="xp-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-xp.png" class="progress-img">
                <label class="section-title">XP Progress</label>
                <span class="progress-number" id="xp-number">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="xp-progress"></div></div>
        </div>

        <div id="streak-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-streak.png" class="progress-img">
                <label class="section-title">Streak</label>
                <span class="progress-number" id="streak-number">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="streak-progress"></div></div>
        </div>

        <div id="score-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-level.png" class="progress-img">
                <label class="section-title">Score Rating</label>
                <span class="progress-number" id="score-number">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="score-progress"></div></div>
        </div>

        <div id="review-tile" class="progress-tile glass-panel">
            <div class="progress-icon-row">
                <img src="images/icon-review.png" class="progress-img">
                <label class="section-title">Due for Review</label>
                <span class="progress-number" id="review-number">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="review-progress"></div></div>
        </div>

    </div>

    <div class="badge-section glass-panel">
        <h3>Your Badges</h3>
        <ul id="badge-list"></ul>
    </div>

</div>

<!-- ============================================================
     TABS (Corrected IDs, removed hidden)
============================================================ -->

<div id="tab-listen" class="tab-page glass-panel">
    <h2>Listen</h2>
    <div id="listenControls">
        <button id="listenPlay" class="pill-btn">Play</button>
        <button id="listenNext" class="pill-btn">Next</button>
        <button id="listenPrev" class="pill-btn">Prev</button>
        <button id="listenAuto" class="pill-btn">Auto</button>
    </div>
    <div id="listenList" class="listen-grid"></div>
</div>

<div id="tab-flashcards" class="tab-page glass-panel">
    <h2>Flashcards</h2>
    <div id="flashcardsGrid" class="flashcards-grid"></div>
</div>

<div id="tab-quiz" class="tab-page glass-panel">
    <h2>Quiz</h2>
    <div id="quizPrompt" class="quiz-prompt"></div>
    <div id="quizOptions" class="quiz-options"></div>
    <div id="quizFeedback" class="quiz-feedback"></div>
</div>

<div id="tab-build" class="tab-page glass-panel">
    <h2>Build a Sentence</h2>
    <div id="buildGrid" class="build-grid"></div>
    <div id="buildOutput" class="build-output"></div>
    <div id="buildResult" class="build-result"></div>
    <button id="buildCheckBtn" class="pill-btn">Check</button>
    <button id="buildNewBtn" class="pill-btn">New</button>
</div>

<div id="tab-sentence" class="tab-page glass-panel">
    <h2>Sentence Generator</h2>
    <div id="sentence-content"></div>
    <button id="sentence-next" class="pill-btn">New Sentence</button>
</div>

<div id="tab-conversation" class="tab-page glass-panel">
    <h2>Conversation</h2>
    <div id="conversationFeed" class="conversation-feed"></div>
    <input id="conversationInput" class="pill-input" placeholder="Type in Spanish...">
    <button id="conversationSend" class="pill-btn">Send</button>
</div>

<div id="tab-practice" class="tab-page glass-panel">
    <h2>Free Practice</h2>
    <input id="practiceInput" class="pill-input" placeholder="Write anything in Spanish...">
    <button id="practiceSubmit" class="pill-btn">Submit</button>
    <div id="practiceScore"></div>
    <div id="practiceKnown"></div>
    <div id="practiceUnknown"></div>
    <div id="practiceHint"></div>
</div>

<div id="tab-review" class="tab-page glass-panel">
    <h2>Review</h2>
    <div id="reviewCard"></div>
    <button id="reviewMastered" class="pill-btn">Mastered</button>
</div>

<div id="tab-achievements" class="tab-page glass-panel">
    <h2>Achievements</h2>
    <div id="achievementsList"></div>
    <button id="achievementsReset" class="pill-btn">Reset Achievements</button>
</div>

<!-- ============================================================
     SCRIPTS
============================================================ -->
<script src="wordbanks/A1.js"></script>
<script src="wordbanks/A2.js"></script>
<script src="wordbanks/B1.js"></script>
<script src="wordbanks/B2.js"></script>
<script src="app.js"></script>

</body>
</html>
