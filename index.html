<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; }
        .hidden { display: none; }
        .card { width: 140px; height: 90px; display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--primary); border-radius: 10px; margin: 8px; cursor: pointer; font-weight: bold; background: white; }
        .word-pill { display: inline-block; padding: 10px 18px; margin: 6px; background: #dbeafe; border-radius: 20px; cursor: pointer; border: 1px solid #bfdbfe; font-size: 14px; }
        .quiz-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .status-box { padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div id="dashboard-view">
        <h1>Dashboard</h1>
        <div class="status-box">Quiz Score: <b id="dashboard-quiz">0%</b></div>
        <div class="status-box">Builder Score: <b id="dashboard-build">0%</b></div>
        <button class="tab-btn" onclick="openApp()" style="margin-top:20px;">Enter Learning Portal</button>
    </div>

    <div id="learning-view" class="hidden">
        <button onclick="goBack()" style="margin-bottom:20px;">← Back to Dashboard</button>
        <div style="background:#eff6ff; padding:10px; border-radius:8px; margin-bottom:15px;">
            Audio Speed: <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1">
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('listen')">1. Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">2. Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">3. Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">4. Building</button>
            <button class="tab-btn" onclick="showTab('conv')">5. Conversation</button>
        </div>
        
        <div class="tab-content" id="listen"><h3>Listen</h3><div id="listen-list"></div></div>
        <div class="tab-content hidden" id="flash"><h3>Flashcards</h3><div id="flash-area"></div></div>
        <div class="tab-content hidden" id="quiz"><h3>Quiz</h3><div id="score-board">0%</div><div id="quiz-area"></div></div>
        <div class="tab-content hidden" id="build">
            <h3>Building</h3>
            <h3 id="build-task"></h3>
            <button onclick="speak(window.currentTask.target)">🔊 Hear</button>
            <div id="word-bank"></div>
            <div id="sentence-box" style="padding:15px; border:2px dashed #cbd5e1; margin: 10px 0; min-height:40px;"></div>
            <button onclick="checkBuild()">Submit</button>
            <button onclick="clearBox('sentence-box')">Reset</button>
            <button id="show-answer-btn" class="hidden" onclick="revealAnswer()">Show Answer</button>
            <button onclick="nextBuild()">Next Task</button>
        </div>
        
        <!-- NEW CONVERSATION TAB -->
        <div class="tab-content hidden" id="conv">
            <h3>Daily Conversation</h3>
            <h3 id="conv-task"></h3>
            <div id="conv-word-bank"></div>
            <div id="conv-sentence-box" style="padding:15px; border:2px dashed #cbd5e1; margin: 10px 0; min-height:40px;"></div>
            <button onclick="checkConv()">Submit</button>
            <button onclick="clearBox('conv-sentence-box')">Reset</button>
            <button id="conv-answer-btn" class="hidden" onclick="revealConv()">Show Answer</button>
            <button onclick="nextConv()">Next Question</button>
        </div>
    </div>
</div>

<script>
    const data = {
        words: [{es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thanks'}, {es: 'Si', en: 'Yes'}, {es: 'Donde', en: 'Where'}, {es: 'Amigo', en: 'Friend'}, {es: 'Bien', en: 'Fine'}, {es: 'Mucho', en: 'Much'}, {es: 'Gusto', en: 'Pleasure'}],
        sentences: [{en: 'I eat bread', target: 'Yo Comer Pan'}, {en: 'The friend is happy', target: 'El Amigo Feliz'}],
        convos: [
            {q: 'How are you?', target: 'Bien Gracias'},
            {q: 'Nice to meet you.', target: 'Mucho Gusto'},
            {q: 'Hello, my friend!', target: 'Hola Amigo'},
            {q: 'Are you happy?', target: 'Si'},
            {q: 'Where is the house?', target: 'Donde Esta La Casa'}
        ]
    };

    let bCount = 0, cCount = 0, bAtt = 0, cAtt = 0, qCorrect = 0, qTotal = 0;

    function speak(t) { const s = new SpeechSynthesisUtterance(t); s.rate = document.getElementById('rate').value; s.lang = 'es-MX'; speechSynthesis.speak(s); }
    function openApp() { document.getElementById('dashboard-view').classList.add('hidden'); document.getElementById('learning-view').classList.remove('hidden'); }
    function goBack() { document.getElementById('dashboard-view').classList.remove('hidden'); document.getElementById('learning-view').classList.add('hidden'); }

    function renderBuild() {
        window.currentTask = data.sentences[bCount];
        document.getElementById('build-task').innerText = currentTask.en;
        document.getElementById('word-bank').innerHTML = data.words.map(w => `<span class="word-pill" onclick="document.getElementById('sentence-box').innerText+=' '+ '${w.es}'">${w.es}</span>`).join('');
    }

    function renderConv() {
        window.currentConv = data.convos[cCount];
        document.getElementById('conv-task').innerText = currentConv.q;
        document.getElementById('conv-word-bank').innerHTML = data.words.map(w => `<span class="word-pill" onclick="document.getElementById('conv-sentence-box').innerText+=' '+ '${w.es}'">${w.es}</span>`).join('');
    }

    function checkBuild() {
        if(document.getElementById('sentence-box').innerText.trim() === currentTask.target) { alert("Correct!"); } 
        else { bAtt++; if(bAtt >= 3) document.getElementById('show-answer-btn').classList.remove('hidden'); }
    }

    function checkConv() {
        if(document.getElementById('conv-sentence-box').innerText.trim() === currentConv.target) { alert("Perfect!"); } 
        else { cAtt++; if(cAtt >= 3) document.getElementById('conv-answer-btn').classList.remove('hidden'); }
    }

    function clearBox(id) { document.getElementById(id).innerText = ''; }
    function nextBuild() { bCount++; bAtt = 0; renderBuild(); }
    function nextConv() { cCount++; cAtt = 0; renderConv(); }
    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

    // Initialize
    document.getElementById('listen-list').innerHTML = data.words.map(w => `<button onclick="speak('${w.es}')">🔊</button> ${w.es}<br>`).join('');
    document.getElementById('flash-area').innerHTML = data.words.map(w => `<div class="card" onclick="this.innerText=(this.innerText=='${w.en}' ? '${w.es}' : '${w.en}')">${w.en}</div>`).join('');
    renderBuild(); renderConv();
</script>
</body>
</html>
