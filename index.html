<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Trainer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            padding: 20px;
            text-align: center;
            background: #1e293b;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            margin: 0;
            color: #a5f3fc;
        }
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #1e293b;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .dash-item {
            text-align: center;
            font-size: 14px;
        }
        .dash-value {
            font-size: 20px;
            color: #a5f3fc;
            font-weight: 600;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: #0f172a;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab-btn {
            padding: 10px 16px;
            border-radius: 8px;
            background: #334155;
            color: white;
            cursor: pointer;
            border: none;
        }
        .tab-btn.active {
            background: #0ea5e9;
        }
        .level-select {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
        }
        .level-btn {
            padding: 8px 14px;
            border-radius: 8px;
            background: #475569;
            color: white;
            cursor: pointer;
            border: none;
        }
        .level-btn.active {
            background: #0ea5e9;
        }
        .hidden {
            display: none;
        }
        .input-field {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .primary-btn, .secondary-btn {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }
        .primary-btn {
            background: #0ea5e9;
            color: white;
        }
        .secondary-btn {
            background: #334155;
            color: white;
        }
        .word-pill {
            padding: 10px;
            border-radius: 8px;
            background: #1e293b;
            color: white;
            cursor: pointer;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>

<header>
    <h1>Spanish CEFR Trainer</h1>
</header>

<!-- DASHBOARD -->
<div class="dashboard">
    <div class="dash-item">
        Quiz<br><span id="dash-quiz-score" class="dash-value">0%</span>
    </div>
    <div class="dash-item">
        Build<br><span id="dash-build-score" class="dash-value">0%</span>
    </div>
    <div class="dash-item">
        Conversations<br><span id="dash-conv-count" class="dash-value">0</span>
    </div>
    <div class="dash-item">
        Level<br><span id="dash-level" class="dash-value">A1</span>
    </div>
</div>

<!-- LEVEL SELECTOR -->
<div class="level-select">
    <button class="level-btn active" data-level="A1">A1</button>
    <button class="level-btn" data-level="A2">A2</button>
    <button class="level-btn" data-level="B1">B1</button>
</div>

<!-- RATE CONTROL -->
<div style="text-align:center; padding:10px;">
    <label for="rate">Speech Rate:</label><br>
    <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1.0">
</div>

<!-- STUDENT NAME -->
<div style="padding:15px; text-align:center;">
    <input id="student-name" class="input-field" placeholder="Your name for certificates">
    <button id="save-name-btn" class="primary-btn" style="margin-top:10px;">Save Name</button>
    <div id="name-status" style="margin-top:10px; font-size:14px;"></div>
</div>

<!-- NAVIGATION -->
<nav>
    <button class="tab-btn active" data-tab="listen">Listen</button>
    <button class="tab-btn" data-tab="flash">Flashcards</button>
    <button class="tab-btn" data-tab="quiz">Quiz</button>
    <button class="tab-btn" data-tab="build">Build</button>
    <button class="tab-btn" data-tab="conversation">Conversation</button>
    <button class="tab-btn" data-tab="grammar">Grammar</button>
</nav>

<!-- TABS -->
<div id="listen"></div>
<div id="flash" class="hidden"></div>
<div id="quiz" class="hidden"></div>
<div id="build" class="hidden"></div>
<div id="conversation" class="hidden"></div>
<div id="grammar" class="hidden"></div>

<!-- BADGES -->
<div style="padding:20px;">
    <h3>Your Badges</h3>
    <ul id="badge-list"></ul>
</div>

<!-- JS -->
<script src="app-v2.js"></script>

</body>
</html>
