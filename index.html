<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .locked { opacity: 0.5; pointer-events: none; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { padding: 10px; border: none; background: #e2e8f0; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .level-card { border: 2px solid var(--primary); padding: 15px; margin: 10px 0; border-radius: 10px; }
        progress { width: 100%; height: 20px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Dashboard -->
    <div id="dashboard-view">
        <h1>CEFR Mastery Dashboard</h1>
        <div id="levels-container"></div>
    </div>

    <!-- Learning Portal -->
    <div id="learning-view" class="hidden">
        <button onclick="goBack()">← Back to Dashboard</button>
        <progress id="progress-bar" value="0" max="100"></progress>
        
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('listen')">Listen</button>
            <button class="tab-btn" onclick="showTab('flash')">Flashcards</button>
            <button class="tab-btn" onclick="showTab('quiz')">Quiz</button>
            <button class="tab-btn" onclick="showTab('build')">Building</button>
        </div>

        <div id="listen" class="tab-content"><h3>Audio Challenge</h3><button onclick="playAudio()">Play</button></div>
        <div id="flash" class="tab-content hidden"><h3>Flashcards</h3><div id="flash-area"></div></div>
        <div id="quiz" class="tab-content hidden"><h3>Quiz</h3><input id="q-input"><button onclick="checkQuiz()">Check</button></div>
        <div id="build" class="tab-content hidden"><h3>Sentence Builder</h3><div id="build-area"></div><button onclick="finishLevel()">Complete</button></div>
    </div>
</div>

<script>
    let userProgress = JSON.parse(localStorage.getItem('cefrProgress')) || {
        unlockedLevels: ['A1'],
        scores: { A1: 0, A2: 0, B1: 0, B2: 0, C1: 0, C2: 0 }
    };

    const curriculum = {
        A1: { target: 'Hola Como Estas' },
        A2: { target: 'Donde Esta La Cafeteria' },
        B1: { target: 'Yo Tengo Que Ir Al Trabajo' },
        B2: { target: 'Estoy Buscando Un Nuevo Apartamento' },
        C1: { target: 'Debemos Abordar El Problema Con Rapidez' },
        C2: { target: 'Domino Completamente Este Asunto' }
    };

    function initDashboard() {
        const container = document.getElementById('levels-container');
        container.innerHTML = '';
        ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'].forEach(level => {
            const isUnlocked = userProgress.unlockedLevels.includes(level);
            container.innerHTML += `
                <div class="level-card ${isUnlocked ? '' : 'locked'}">
                    <h3>Level ${level} ${isUnlocked ? '✅' : '🔒'}</h3>
                    <button ${isUnlocked ? `onclick="startLevel('${level}')"` : ''}>${isUnlocked ? 'Start' : 'Locked'}</button>
                </div>`;
        });
    }

    function startLevel(level) {
        window.currentLevel = level;
        document.getElementById('dashboard-view').classList.add('hidden');
        document.getElementById('learning-view').classList.remove('hidden');
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.remove('hidden');
        event.target.classList.add('active');
    }

    function playAudio() {
        const msg = new SpeechSynthesisUtterance(curriculum[currentLevel].target);
        msg.lang = 'es-ES';
        window.speechSynthesis.speak(msg);
    }

    function checkQuiz() {
        if (document.getElementById('q-input').value === curriculum[currentLevel].target) {
            document.getElementById('progress-bar').value = 50;
        }
    }

    function finishLevel() {
        userProgress.scores[currentLevel] = 100;
        const levels = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
        const nextIdx = levels.indexOf(currentLevel) + 1;
        if (nextIdx < levels.length) userProgress.unlockedLevels.push(levels[nextIdx]);
        localStorage.setItem('cefrProgress', JSON.stringify(userProgress));
        goBack();
    }

    function goBack() {
        document.getElementById('dashboard-view').classList.remove('hidden');
        document.getElementById('learning-view').classList.add('hidden');
        initDashboard();
    }

    initDashboard();
</script>
</body>
</html>
