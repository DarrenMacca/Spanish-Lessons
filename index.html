<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish CEFR Mastery Portal</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .dashboard { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 25%; transition: 0.5s; }
        .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: center; font-weight: 600; background: #fff; }
        .quiz-item { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .controls { margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>CEFR Mastery: A1 Beginner</h1>
    <div class="progress-bar"><div class="progress-fill" id="p-bar"></div></div>
    <p>Skill Level: <b>Elementary Starter</b> | <span id="xp-counter">250 XP</span></p>

    <div class="controls">
        Audio Speed: <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1"> 
    </div>

    <div class="section-grid">
        <!-- Listen & Flashcards -->
        <div class="box">
            <h3>Listen & Flashcards</h3>
            <div id="flash-area" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
        </div>

        <!-- Quiz -->
        <div class="box">
            <h3>Vocabulary Quiz</h3>
            <div id="quiz-area"></div>
        </div>
    </div>

    <!-- Builder -->
    <div class="box" style="margin-top:20px;">
        <h3>Sentence Builder</h3>
        <div id="build-area"></div>
        <div id="sentence-box" style="padding:15px; background:#f8fafc; border:2px dashed #cbd5e1; margin:10px 0; min-height:40px;"></div>
        <button onclick="checkBuild()">Submit</button>
    </div>
</div>

<script>
    const data = {
        words: [{es: 'Hola', en: 'Hello'}, {es: 'Gracias', en: 'Thank you'}, {es: 'Casa', en: 'House'}, {es: 'Yo', en: 'I'}, {es: 'Feliz', en: 'Happy'}],
        sentences: [{en: 'I eat bread', target: 'Yo Comer Pan'}, {en: 'The dog is happy', target: 'El Perro Feliz'}]
    };

    function init() {
        // Flashcards (Toggle Logic)
        document.getElementById('flash-area').innerHTML = data.words.map(w => `
            <div class="card" onclick="this.innerText=(this.innerText=='${w.en}' ? '${w.es}' : '${w.en}'); speak(this.innerText)">${w.en}</div>
        `).join('');

        // Quiz
        document.getElementById('quiz-area').innerHTML = data.words.map((w, i) => `
            <div class="quiz-item">
                <span>${w.en}</span>
                <input id="in-${i}" placeholder="Spanish...">
                <button onclick="validate(${i}, '${w.es}')">Check</button>
            </div>`).join('');
    }

    function validate(i, ans) {
        const val = document.getElementById('in-'+i).value;
        alert(val.toLowerCase() === ans.toLowerCase() ? "✅ Correct" : "❌ Incorrect");
    }

    function speak(t) { 
        const s = new SpeechSynthesisUtterance(t); 
        s.rate = document.getElementById('rate').value; 
        window.speechSynthesis.speak(s); 
    }

    // Builder Logic
    function initBuild() {
        document.getElementById('build-area').innerHTML = `
            <button onclick="speak(data.sentences[0].target)">🔊 Hear Sentence</button>
            <div style="margin:10px 0;">${data.words.map(w => `<span onclick="document.getElementById('sentence-box').innerText+='${w.es} '">${w.es}</span>`).join(' | ')}</div>
        `;
    }
    
    function checkBuild() { alert("Building Task Checked."); }

    init(); initBuild();
</script>
</body>
</html>
