<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEFR Spanish Proficiency Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4">
    <header class="max-w-4xl mx-auto mb-8">
        <h1 class="text-3xl font-bold text-blue-900">Spanish CEFR Portal</h1>
        <p class="text-slate-600">Mastering language through the official CEFR standard.</p>
    </header>

    <main class="max-w-4xl mx-auto">
        <!-- Credential Section -->
        <div class="bg-white p-6 rounded-xl shadow border mb-8">
            <h2 class="font-bold mb-4">Earned Credentials</h2>
            <div id="credential-showcase" class="grid grid-cols-3 md:grid-cols-6 gap-2">
                ${['A1','A2','B1','B2','C1','C2'].map(lvl => `
                    <div id="cred-${lvl}" class="p-2 border rounded-lg text-center bg-slate-100 opacity-50">
                        <p class="font-bold text-xs">${lvl}</p>
                    </div>`).join('')}
            </div>
        </div>

        <div id="lessons-list" class="space-y-4"></div>
    </main>

    <script>
        const curriculum = [
            { id: 0, level: 'A1', title: 'Beginner', desc: 'Basic words and simple phrases.' },
            { id: 1, level: 'A2', title: 'Elementary', desc: 'Simple everyday conversations.' },
            { id: 2, level: 'B1', title: 'Intermediate', desc: 'Independent communication.' },
            { id: 3, level: 'B2', title: 'Upper-Intermediate', desc: 'Confident discussion.' },
            { id: 4, level: 'C1', title: 'Advanced', desc: 'Effective use for study or work.' },
            { id: 5, level: 'C2', title: 'Mastery', desc: 'Fluent and precise expression.' }
        ];

        function renderDashboard() {
            const list = document.getElementById('lessons-list');
            list.innerHTML = curriculum.map(l => `
                <div class="p-4 bg-white border rounded-lg flex justify-between items-center shadow-sm">
                    <div><span class="font-bold text-blue-600">${l.level}</span>: ${l.title}</div>
                    <button class="bg-blue-600 text-white px-4 py-1 rounded">Start</button>
                </div>`).join('');
        }
        renderDashboard();
    </script>
</body>
</html>
