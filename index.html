<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CEFR Spanish Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ============================
         GLOBAL DASHBOARD + SUMMARY
         (NEW ADDITIONS)
    ============================ -->

    <div id="dashboard" class="glass"></div>
    <div id="progress-summary" class="glass"></div>
    <div id="achievements" class="glass"></div>
    <div id="daily-summary" class="glass"></div>
    <div id="recommendations" class="glass"></div>

    <!-- ============================
         NAVIGATION TABS
    ============================ -->
    <div id="nav">
        <button onclick="showTab('listen')">Listen</button>
        <button onclick="showTab('flashcards')">Flashcards</button>
        <button onclick="showTab('build')">Build</button>
        <button onclick="showTab('sentence')">Sentence</button>
        <button onclick="showTab('wordbank')">Word Bank</button>
    </div>

    <!-- ============================
         LISTEN TAB
    ============================ -->
    <div id="tab-listen" class="tab glass">
        <h2>Listen</h2>
        <div id="listen-content"></div>
    </div>

    <!-- ============================
         FLASHCARDS TAB
    ============================ -->
    <div id="tab-flashcards" class="tab glass">
        <h2>Flashcards</h2>
        <div id="flashcards-content"></div>
    </div>

    <!-- ============================
         BUILD TAB
    ============================ -->
    <div id="tab-build" class="tab glass">
        <h2>Build a Sentence</h2>
        <div id="build-content"></div>
    </div>

    <!-- ============================
         SENTENCE TAB
    ============================ -->
    <div id="tab-sentence" class="tab glass">
        <h2>Sentence Practice</h2>
        <div id="sentence-content"></div>
    </div>

    <!-- ============================
         WORD BANK TAB
    ============================ -->
    <div id="tab-wordbank" class="tab glass">
        <h2>Word Bank</h2>
        <div id="wordbank-content"></div>
    </div>

    <!-- ============================
         JAVASCRIPT ENGINE
    ============================ -->
    <script src="app.js"></script>

</body>
</html>
